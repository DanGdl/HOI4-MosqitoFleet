 mdg_ship_hull_midget_submarine_1: "Einfacher Kleinst-U-Boot"
 mdg_ship_hull_midget_submarine_1_desc: "Ein kleines U-Boot, das von einer kleinen Besatzung betrieben wird. Seine reduzierte Reichweite und Waffenfähigkeit wird durch eine hohe Produktionsrate ausgeglichen."
 mdg_ship_hull_midget_submarine_2: "Verbesserter Kleinst-U-Boot"
 mdg_ship_hull_midget_submarine_2_desc: "Ein kleines U-Boot, das von einer kleinen Besatzung betrieben wird und für alles eingesetzt werden kann, von Hafen-Sabotage bis zur Konvoijagd. Seine reduzierte Reichweite und Waffenfähigkeit wird durch eine hohe Produktionsrate ausgeglichen."

