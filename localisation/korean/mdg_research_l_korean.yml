l_korean:
 early_destroyer: "구축함 I"
 basic_destroyer: "구축함 II"
 advanced_destroyer: "구축함 IV"
 early_destroyer_desc: "수송선의 안전을 보장하기 위해 대전쟁 시기의 구축함들을 개장하고 발전시켜야 합니다. 더 많은 어뢰를 탑재한다면 교전을 더 많이 할 수 있을 겁니다."
 basic_destroyer_desc: "우리 구축함은 더 긴 어뢰 사거리와 더 빠른 재장전 속도, 대공 포탑 같은 새로운 유형의 무장을 통해 효율성과 범용성을 유지할 것입니다."
 improved_destroyer_desc: "새로운 구축함은 위와 아래에서 덮쳐 오는 위협에 더 잘 대처하기 위해 레이더와 현대식 대공 화기 및 대잠 무기를 장착해야 합니다."
 advanced_destroyer_desc: "현대식 구축함은 다양한 탐지 기술과 새로운 폭뢰 투하 시스템을 갖추어야 하며, 이전 구축함보다 더 큰 배수량을 가져야 합니다."
 ENG_early_destroyer: "V/W급"
 ENG_early_destroyer_desc: "V/W급 구축함의 예시로는 애드미럴리티급과 소니크로프트 V 및 W급이 있습니다. 이들은 전시 비상 계획하에 건조되었습니다. 이들은 제1차 세계 대전에서 쓰인 영국 구축함 설계가 궁극적으로 진화한 형태로서 이전 모델들의 개선점과 새로운 기술적 진보가 모두 반영되어 있습니다. V/W 구축합은 제1차 세계 대전 후반기에 다수 건조되어 이후 영국 해군 구축함 소함대의 중추가 되었습니다. 1930년대부터는 예비 함대로 편입되기 시작했고, 결국에는 수송선 호위 임무만 수행하게 되었습니다. 이들은 적절한 무장을 갖추고 빠른 속도와 넓은 작전 범위를 자랑하는 함선입니다."
 ENG_basic_destroyer: "G/H/I급"
 ENG_basic_destroyer_desc: "G, H, I급 구축함은 1933년과 1934년에 해군 건설 계획의 일환으로 발주되었습니다. 이들은 이전 F급 구축함와 거의 똑같았으며, 크기만 약간 줄어들었습니다. G급과 H급의 무장은 F급과 동일하며, 모두 4.7인치 함포를 사용했습니다. 이 함선들은 작전 범위가 넓었으며, 무장도 충분했고, 강력한 어뢰를 탑재하고 있었습니다. 전쟁 기간 동안 광범위하게 사용되었으며, 그렇기에 손실도 많았습니다."
 ENG_improved_destroyer: "J/K/N급"
 ENG_improved_destroyer_desc: "J, K, N급 구축함은 이전의 트라이벌급과 유사했으나, 화력보다는 중형 어뢰와 경량 포를 중심으로 한 좀 더 표준적인 설계로 돌아갔습니다. 이 함선들은 전쟁 기간 동안 지속적으로 개조되었으며, 대공포와 레이더가 향상되었습니다. 빠르고, 작전 범위가 넓으며, 함대 호위에 적합한 무장과 성능을 갖춘 함선입니다."
 ENG_advanced_destroyer: "배틀급"
 ENG_advanced_destroyer_desc: "배틀급 구축함은 전쟁 내내 사용된 영국 구축함의 진화를 바탕으로 제작되었습니다. 이 함선들은 1942년과 1943년 해군 계획의 일환으로 주문되었습니다. 이들은 포와 어뢰 양면에서 강력한 무장을 갖추고 있었습니다. 대공 무장, 대잠 능력, 속도, 항속거리가 뛰어난 다목적 함선이었지만, 전쟁 후기에 도입되어 기여도는 미미했습니다."
 FRA_early_destroyer: "부라스크급"
 FRA_early_destroyer_desc: "부라스크급 구축함은 1,500톤급 시리즈의 일부로 1920년대 중반에 진수되었습니다. 이전의 샤칼급과 이후의 르아드와급과 함께, 이들은 전후 프랑스 신형 함대의 중추를 이루었습니다. 당시 기준으로 빠르고 무장도 강력했으나, 어뢰 무장은 다른 해군의 유사 함정에 비해 다소 적습니다."
 FRA_basic_destroyer: "르 팡타스크급"
 FRA_basic_destroyer_desc: "르 팡타스크급 구축함은 1930년 해군 계획에 따라 건조된 2,400톤급 대형 구축함들(게파급, 에이글급, 보클랭급)의 개량형입니다. 이들은 크고 무장이 강력하며 매우 빠른 구축함으로, 프랑스 함대의 새로운 고속 함정을 호위하는 데 적합했습니다. 무장은 새로 개발된 함포, 적절한 대공 무기, 어뢰 무장으로 구성되어 있습니다."
 FRA_improved_destroyer: "랭트레피드급"
 FRA_improved_destroyer_desc: "랭트레피드급 구축함은 이전의 르 아르디급 구축함의 개장형입니다. 1938년과 1939년 해군 계획에서 승인되었으나, 전쟁과 프랑스의 함락으로 인해 취소되었습니다. 이 구축함들은 대공 역할에 더 중점을 두었으며, 배수량이 2,800톤-2,900톤으로 증가하고 더 큰 엔진을 탑재했습니다."
 FRA_advanced_destroyer: "오슈급"
 FRA_advanced_destroyer_desc: "오슈급과 바야르급은 프랑스 해군의 최종 초대형 구축함 설계였습니다. 두 급 모두 모가도르급을 기반으로 하여 4,200톤의 배수량과 유사한 주포를 장착했으나, 대공포가 개선되고 엔진이 강화되었습니다. 이들은 1939년-1940년 해군 계획에서 승인되었으나, 전쟁 발발과 프랑스의 함락으로 인해 건조가 취소되었습니다."
 GER_early_destroyer: "23형"
 GER_early_destroyer_desc: "23형은 제1차 세계 대전 이후 크릭스마리네를 위해 건조된 어뢰정급 함선입니다. 1926년부터 1928년 사이에 6척이 건조되었으며 모두 제2차 세계 대전 동안 운용되었습니다. 어뢰정으로 분류되었음에도 불구하고, 이 함선들은 구축함 크기로 920톤이 넘는 배수량을 가지고 있으며, 105mm L/45 포 3문을 장착하고 있습니다."
 GER_basic_destroyer: "1934년형 구축함"
 GER_basic_destroyer_desc: "1934년형 구축함은 제1차 세계 대전 이후 독일에서 처음으로 건조된 구축함급입니다. 이 함급은 5인치 함포 5문과 어뢰관 8개를 장착했습니다. 총 16척이 건조되었으며, 그중 12척은 개량형인 1934A형 하위 함급이었습니다."
 GER_improved_destroyer: "나르비크급"
 GER_improved_destroyer_desc: "연합군에는 나르비크급 구축함으로 알려져 있는 1936A형 구축함은 신형 150mm(5.9인치) 함포를 탑재하도록 설계되었습니다. 선미 쪽에 단장포 3문과 선수 쪽에 연장포 1문을 탑재하도록 설계되었지만, 처음에는 선수 쪽에 단장포 1문을 탑재했습니다. 함급 내 8척 중 4척은 후에 연장포를 탑재하도록 개장되었습니다. 후기형 7척은 선수 쪽에 연장포를 탑재한 약간 개선된 설계로 건조되었습니다."
 GER_advanced_destroyer: "1944년형 구축함"
 GER_advanced_destroyer_desc: "디젤 추진 구축함의 첫 번째 시제품(1942년형 구축함)은 완성되지 않았지만, 함종 개발은 계속되었습니다. 여러 안이 만들어졌으며, 마침내 1944년형 구축함 계획으로 이어졌습니다. 강력한 주포 외에도, 이 함선들은 이전 함급에 비해 향상된 대공 화력을 갖추었으며, 새로운 5.5cm 대공포도 포함되어 있습니다."
 ITA_early_destroyer: "쿠르타토네급"
 ITA_early_destroyer_desc: "쿠르타토네급 구축함은 제1차 세계대전 종전 후 이탈리아에서 처음으로 건조된 구축함이자, 2연장 포탑을 사용한 최초의 구축함입니다. 이 함선들은 원래 팔레스트로급 구축함과 동시에 주문되었으나, 강철 부족으로 인해 건조가 연기되었습니다. 배수량은 1,000톤에 미치지 못하며, 102mm 슈나이더-암스트롱 포 4문을 장착하고 있습니다."
 ITA_basic_destroyer: "솔다티급"
 ITA_basic_destroyer_desc: "솔다티급 구축함은 1930년대 후반에 건조된 구축함 그룹입니다. 두 차례에 걸쳐 건조되었으며, 1차 건조분은 1938-39년에 12척이 완성되었으며, 2차 건조분은 1941-42년에 5척이 완성되었습니다. 1차 건조분의 배수량은 약 1,800톤이며, 120mm 안살도 포 4문을 장착했습니다."
 ITA_improved_destroyer: "키클로네급"
 ITA_improved_destroyer_desc: "키를로네급 구축함은 어뢰정으로 분류되었지만 실제로는 호위 구축함에 더 가까웠습니다. 이전 오르사급을 약간 크게 만든 키를로네급은 배수량이 1,100톤을 넘었으며, 안정성이 향상되고, 더 강한 대잠 무장을 탑재했습니다."
 ITA_advanced_destroyer: "메달리에 드'오로급"
 ITA_advanced_destroyer_desc: "코만단티 메달리에 드'오로급은 이탈리아 왕립해군이 계획한 구축함 함급이었으나 이탈리아가 항복할 때까지 단 한 척도 진수되지 못했습니다. 메달리에 드'오로급은 이전의 이탈리아제 구축함보다 확실히 커서 배수량이 2,100톤에 달했습니다. 또, 135mm 안살도 대구경 포를 장착하고 향상된 엔진을 탑재했습니다."
 JAP_early_destroyer: "미네카제급"
 JAP_early_destroyer_desc: "미네카제급, 가미카제급, 무쓰키급 구축함은 당시 기준으로 수상 함포와 어뢰 무장을 잘 갖추었으나 대공 무장은 제한적이었습니다. 이들은 제2차 세계 대전 시작 시점에 구식으로 간주되어 주로 보조 임무에 배치되었습니다."
 JAP_basic_destroyer: "아사시오급"
 JAP_basic_destroyer_desc: "아사시오급 구축함은 일본 구축함 중 처음으로 배수량 2,000톤을 초과한 함급이며, 최초로 음파탐지기를 장착한 구축함입니다. 이들은 강력한 어뢰 무장과 적절한 경량 대공포를 갖추었으며, 구형 후부키급보다 약간 더 넓은 작전 범위를 자랑합니다."
 JAP_improved_destroyer: "아키즈키급"
 JAP_improved_destroyer_desc: "아키즈키급 구축함은 무장을 잘 갖추어 수상 함포부터 어뢰, 적절한 대공 무장과 함께 절실히 필요했던 여분의 폭뢰까지 보유했습니다. 계획된 39척 중 12척만이 완성된 후 시리즈가 취소되었습니다."
 JAP_advanced_destroyer: "시마카제급"
 JAP_advanced_destroyer_desc: "시마카제급 구축함은 완성 당시 세계에서 가장 빠른 구축함이었습니다. 이 함선은 고온, 고압의 터빈을 시험하기 위한 시제품 구축함이었습니다. 매우 빠른 속도와 강력한 어뢰 무장을 갖추었지만, 그로 인해 작전 범위가 좁았습니다."
 SOV_early_destroyer: "오르페이급"
 SOV_early_destroyer_desc: "오르페이급 구축함은 선행 함급인 노비크급의 개량형이었습니다. 함급은 크기에 맞는 수상 및 대공 무장을 갖추었으며, 항속거리가 다소 짧았으나 준수한 속도와 강력한 어뢰를 갖추었습니다. 후계 함급인 피도니시급과 이쟈슬라프급은 이 함급의 주무장과 선체 크기를 늘린 추가 개량형이었습니다."
 SOV_basic_destroyer: "그네브니급"
 SOV_basic_destroyer_desc: "그네브니급 구축함(프로옉트 7형)은 1933년-1938년 조선 계획에 따라 승인되었습니다. 이 함급은 이탈리아 구축함 마에스트랄레의 영향을 크게 받았으며 성공적인 설계로 평가받습니다. 배수량은 1,600톤-2,000톤 범위였고, 무장이 강력하며 대공 및 어뢰 무장도 충분했습니다. 강력한 엔진 덕분에 속도는 빨랐지만, 작전 범위는 짧았습니다."
 SOV_improved_destroyer: "사브라지텔니급"
 SOV_improved_destroyer_desc: "사브라지텔니급 구축함(프로옉트 7U형)은 이전 그네브니급의 개량형입니다. 엔진이 재설계되었으며 대공 무장이 강화되었습니다. 배수량은 1,900톤에서 2,400톤 사이이며, 속도와 작전 범위는 그네브니급과 비슷했습니다."
 SOV_advanced_destroyer: "스코리급"
 SOV_advanced_destroyer_desc: "스코리급(프로옉트 30bis형)은 아그네보이급의 추가 개량형입니다. 크기와 배수량(2,500톤-3,100톤)이 증가한 덕분에 작전 범위가 늘어난 더욱 안정적인 함선이 되었습니다. 모든 함선은 전쟁 이후 모듈식 설계로 건조되어 신속한 건조와 배치가 가능했습니다. 무장은 이전 아그네보이급과 동일하지만, 주포가 단일 포탑 대신 2연장 포탑에 장착되었습니다."
 USA_early_destroyer: "클렘슨급"
 USA_early_destroyer_desc: "클렘슨급 구축함은 선행 함급인 위키스급의 설계 요소를 많이 계승했습니다. 클렘슨급은 위키스급보다 향상된 해상 조종 성능을 갖추었으며, 4인치 50구경 주포, 3인치 23구경 대공포, 12개의 어뢰관을 장착했습니다. 이 함급은 노후화되어 거의 구식이 되었지만, 여전히 미 해군 구축함 전력의 큰 부분을 차지했었습니다."
 USA_basic_destroyer: "심스급"
 USA_basic_destroyer_desc: "심스급은 가장 큰 '1500톤급' 설계로, 더 효율적인 어뢰 배치와 긴 선체를 갖추고 있습니다. 사격 통제의 향상으로 5인치 38구경 포의 공격 능력이 강화되었으며, 12문의 중심선 어뢰관이 포함되어 있습니다."
 USA_improved_destroyer: "플레처급"
 USA_improved_destroyer_desc: "플레처급은 2500톤으로 크기가 커지면서 그에 따른 성능의 비약적인 발전을 보여주는 대표적인 구축함이었습니다. 5인치 38구경장 양용포와 중심선 어뢰 배열을 유지하면서도, 플레처급은 추가로 하나의 단장 포탑과 비약적으로 향상된 대공 무장을 탑재하였고 거기에 더하여 향상된 항속거리와 커진 배수량 또한 가지게 되었습니다."
 USA_advanced_destroyer: "알렌 M. 섬너급"
 USA_advanced_destroyer_desc: "섬너급 구축함은 플레처급을 계승하면서 배수량이 약간만 증가했습니다. 이 함정은 5인치 38구경 2연장 포와 훨씬 많은 대공 무장을 탑재할 수 있었습니다. 두 번째 조타 키가 추가되어 대잠수함 작전 중 기동성이 향상되었습니다."
 ARG_early_destroyer: "카타마르카급"
 ARG_early_destroyer_desc: "카타마르카급 구축함은 제1차 세계 대전 직전에 아르헨티나 해군이 주문하고 영국에서 건조됐습니다. 이 함선들은 120mm/50구경 주포 4문과 533mm 어뢰관 4개를 장착했습니다."
 ARG_basic_destroyer: "부에노스아이레스급"
 ARG_basic_destroyer_desc: "부에노스아이레스급 구축함은 1936년부터 1938년 사이에 아르헨티나를 위해 영국에서 건조되었습니다. 이 함정들은 영국의 G급 구축함을 기반으로 설계되었습니다. 배수량은 1,300톤이 넘으며, 주무장으로는 4문의 QF 4.7인치 마크 IX 주포를 장착하고 있습니다."
 AST_early_destroyer: "벤데타급"
 AST_early_destroyer_desc: "이 구축함 함급은 '고철 전단'을 편성하기 위해 오스트레일리아 왕립해군에 양도된 애드미럴리티급과 소니크로프트 V 및 W급을 포함했습니다. 이들은 전시 비상 계획하에 건조되었습니다. 이들은 제1차 세계 대전에서 쓰인 영국 구축함 설계가 궁극적으로 진화한 형태로서 이전 모델들의 개선점과 새로운 기술적 진보가 모두 반영되어 있습니다. V/W 구축합은 제1차 세계 대전 후반기에 다수 건조되어 이후 영국 해군 구축함 소함대의 중추가 되었습니다. 1930년대부터는 예비 함대로 편입되기 시작했고, 결국에는 수송선 호위 임무만 수행하게 되었습니다. 이들은 적절한 무장을 갖추고 빠른 속도와 넓은 작전 범위를 자랑하는 함선입니다."
 AST_basic_destroyer: "G/H/I급"
 AST_basic_destroyer_desc: "G, H, I급 구축함은 1933년과 1934년에 해군 건설 계획의 일환으로 발주되었습니다. 이들은 이전 F급 구축함와 거의 똑같았으며, 크기만 약간 줄어들었습니다. G급과 H급의 무장은 F급과 동일했으며, 모두 4.7인치 함포를 사용했습니다. 이 함선들은 작전 범위가 넓었으며, 무장도 충분했고, 강력한 어뢰를 탑재하고 있었습니다. 전쟁 기간 동안 광범위하게 사용되었으며, 그렇기에 손실도 많았습니다."
 AST_improved_destroyer: "니잠급"
 AST_improved_destroyer_desc: "니잠급은 영국 해군에서 양도된 J, K, N급 구축함을 가리키는 명칭입니다. 이들은 이전의 트라이벌급과 유사했으나, 화력보다는 중형 어뢰와 경량 포를 중심으로 한 좀 더 표준적인 설계로 돌아갔습니다. 이 함선들은 전쟁 기간 동안 지속적으로 개조되었으며, 대공포와 레이더가 향상되었습니다. 빠르고, 작전 범위가 넓으며, 함대 호위에 적합한 무장과 성능을 갖춘 함선입니다."
 AST_advanced_destroyer: "배틀급"
 AST_advanced_destroyer_desc: "배틀급 구축함은 전쟁 내내 사용된 영국 구축함의 진화를 바탕으로 제작되었습니다. 이 함선들은 1942년과 1943년 해군 계획의 일환으로 주문되었습니다. 이들은 포와 어뢰 양면에서 강력한 무장을 갖추고 있었습니다. 대공 무장, 대잠 능력, 속도, 항속거리가 뛰어난 다목적 함선이었습니다."
 BRA_early_destroyer: "마라냥급"
 BRA_early_destroyer_desc: "마라냥은 1922년에 브라질에 판매된 영국제 K급 구축함입니다. 이 함선은 배수량이 930톤을 조금 넘으며, 4문의 4인치 포로 무장했습니다."
 BRA_basic_destroyer: "주루에나급"
 BRA_basic_destroyer_desc: "주루에나급 구축함은 1930년대 후반에 브라질이 주문한 6척의 H급 영국제 구축함입니다. 그러나 1939년 전쟁이 발발하자 영국이 해당 함선을 징발하여 브라질에 인도되지 않았습니다. 이 함선들은 1,300톤 이상 배수량을 가지고 있으며, 우수한 속도를 자랑하고, 주무장으로는 3문의 QF 4.7인치 Mk IX 포와 8개의 533mm 어뢰관을 장착하고 있습니다."
 BRA_improved_destroyer: "마르실리우 디아스급"
 BRA_improved_destroyer_desc: "마르실리우 디아스급 구축함(때때로 M급 또는 그린헐그급이라고도 불림)은 1943년에 취역한 브라질 해군의 함선 3척입니다. 이들은 미국의 머핸급 구축함을 기반으로 하였으며, 브라질에서 건조된 최초의 대형 함선입니다. 배수량은 1,500톤이며, 5인치/38구경 주포 5문을 장착하고 있습니다."
 BRA_advanced_destroyer: "아크리급"
 BRA_advanced_destroyer_desc: "아크리급(때때로 아마조나스급으로도 불림)은 브라질 해군을 위해 건조된 6척의 구축함을 의미합니다. 이들 함선은 전쟁이 끝나기 전에 완성되지 못했습니다. 해당 함선들은 영국의 설계를 수정하여 브라질에서 건조되었으며, 전쟁 초기에 영국이 징발한 6척의 주루에나급 구축함을 대체하기 위해 미국 장비가 일부 사용되었습니다."
 CAN_early_destroyer: "V/W급"
 CAN_early_destroyer_desc: "V/W급 구축함의 예시로는 애드미럴리티급과 소니크로프트 V 및 W급이 있습니다. 이들은 전시 비상 계획하에 건조되었습니다. 이들은 제1차 세계 대전에서 쓰인 영국 구축함 설계가 궁극적으로 진화한 형태로서 이전 모델들의 개선점과 새로운 기술적 진보가 모두 반영되어 있습니다. V/W 구축합은 제1차 세계 대전 후반기에 다수 건조되어 이후 영국 해군 구축함 소함대의 중추가 되었습니다. 1930년대부터는 예비 함대로 편입되기 시작했고, 결국에는 수송선 호위 임무만 수행하게 되었습니다. 이들은 적절한 무장을 갖추고 빠른 속도와 넓은 작전 범위를 자랑하는 함선입니다."
 CAN_basic_destroyer: "오타와급"
 CAN_basic_destroyer_desc: "오타와급은 1933년과 1934년 해군 건조 계획의 일환으로 주문된 영국 G, H, I급 구축함에 대한 캐나다의 명칭입니다. G, H, I급 구축함은 1933년과 1934년에 해군 건설 계획의 일환으로 발주되었습니다. 이들은 이전 F급 구축함와 거의 똑같았으며, 크기만 약간 줄어들었습니다. G급과 H급의 무장은 F급과 동일했으며, 모두 4.7인치 함포를 사용했습니다. 이 함선들은 작전 범위가 넓었으며, 무장도 충분했고, 강력한 어뢰를 탑재하고 있었습니다. 전쟁 기간 동안 광범위하게 사용되었으며, 그렇기에 손실도 많았습니다."
 CAN_improved_destroyer: "J/K/N급"
 CAN_improved_destroyer_desc: "J, K, N급 구축함은 이전의 트라이벌급과 유사했으나, 화력보다는 중형 어뢰와 경량 포를 중심으로 한 좀 더 표준적인 설계로 돌아갔습니다. 이 함선들은 전쟁 기간 동안 지속적으로 개조되었으며, 대공포와 레이더가 향상되었습니다. 빠르고, 작전 범위가 넓으며, 함대 호위에 적합한 무장과 성능을 갖춘 함선입니다."
 CAN_advanced_destroyer: "알곤퀸급"
 CAN_advanced_destroyer_desc: "알곤퀸급은 영국 배틀급 구축함의 캐나다식 호칭이었습니다. 이 함선들은 1942년과 1943년 해군 계획의 일환으로 주문되었습니다. 이들은 포와 어뢰 양면에서 강력한 무장을 갖추고 있었습니다. 대공 무장, 대잠 능력, 속도, 항속거리가 뛰어난 다목적 함선이었지만, 전쟁 후기에 도입되어 기여도는 미미했습니다."
 CHI_early_destroyer: "젠웨이급"
 CHI_early_destroyer_desc: "젠웨이급은 중국국민당 해군을 위해 건조되어 1904년에 취역한 대형 어뢰정 함급입니다. 이 함급의 두 척은 현대화되어 일본의 침략 당시에도 여전히 운용 중이었습니다. 현대화 후에는 배수량이 870톤이었으며, 2문의 4.7인치 주포로 무장했습니다."
 CHL_early_destroyer: "알미란테 린치급"
 CHL_early_destroyer_desc: "알미란테 린치급 구축함은 제1차 세계 대전 직전에 영국에서 칠레 해군을 위해 건조된 6척의 함선입니다. 전쟁 발발 전에 2척만 인도되어 1945년까지 운용되었습니다. 배수량은 1,430톤이며, 당시 기준으로 준수한 속도와 항속거리를 갖추었고, 6문의 4인치 L/40 QF Mark VI 주포와 2개의 21인치 어뢰관으로 무장했습니다."
 COL_basic_destroyer: "안티오키아급"
 COL_basic_destroyer_desc: "안티오키아급 구축함은 콜롬비아 해군을 위해 포르투갈에서 건조된 2척의 구축함으로 구성되어 있습니다. 이 함선들은 1934년에 취역했습니다. 배수량은 1,200톤이 넘으며, 4문의 BL 4.7인치 포와 8개의 533mm 어뢰관을 장착하고 있습니다."
 DEN_advanced_destroyer: "휘펠트급"
 DEN_advanced_destroyer_desc: "휘펠트급, 나자덴급으로도 알려진 이 함급은 덴마크에서 건조되어 취역한 두 척의 대형 어뢰정으로 구성되어 있습니다. 1942년에 건조가 시작되었으며, 1947년에 완성되었습니다. 배수량은 780톤을 넘으며, 주무장으로 105mm 포 2문과 533mm 어뢰관 6개, 그리고 다양한 대잠 무기를 탑재하고 있습니다."
 GRE_early_destroyer: "아에토스급"
 GRE_early_destroyer_desc: "아에토스급 구축함은 영국에서 건조되어 그리스 해군이 제1차 세계 대전에 앞서 구매했습니다. 네 척 모두 제2차 세계 대전 동안 운용되었습니다. 배수량은 980톤이며, 105mm/40 암스트롱 P포 4문과 533mm 어뢰관 4개를 장착했습니다. 1920년대 후반에 현대화 작업을 거쳤습니다."
 GRE_basic_destroyer: "바실레프스 예오르요스 I급"
 GRE_basic_destroyer_desc: "바실레프스 예오르요스 I급은 1930년대 후반 그리스 해군을 위해 영국에서 건조된 두 척의 개조된 영국 H급 구축함 함급입니다. 이 함선들은 1,350톤의 배수량을 가지며 준수한 속도를 자랑합니다. 장거리 항해가 가능하며, 128mm/42 SK C/34 포 4문과 강력한 어뢰 무장을 갖추고 있습니다."
 GRE_improved_destroyer: "아드리아스급"
 GRE_improved_destroyer_desc: "아드리아스급은 영국의 헌트 III급 호위 구축함 6척으로 구성된 함급이며, 그중 4척은 1942년에 망명 중인 그리스 해군에 이양되었습니다. 호위 구축함으로서 이들은 일반 구축함보다 속도가 느렸습니다. 배수량은 1,050톤이며, 주무장으로 102mm/45 QF Mk XVI 포 4문을 탑재했고, 강력한 어뢰와 대잠 장비를 갖추고 있습니다."
 GRE_advanced_destroyer: "레온급"
 GRE_advanced_destroyer_desc: "레온급은 미국의 캐논급 호위 구축함이었습니다. 1943년에 취역했으나 1951년까지 그리스 해군에 인도되지 않았습니다. 이 함선들은 일반 구축함보다 속도가 느렸습니다. 배수량은 1,240톤이며, 주무장으로 3인치 40구경 3문과 강력한 어뢰 및 대잠 장비를 갖추고 있습니다."
 HOL_early_destroyer: "판 헨트급"
 HOL_early_destroyer_desc: "판 헨트 또는 아드미랄런급은 1926년부터 1931년 사이에 네덜란드 왕립해군을 위해 건조된 8척의 구축함으로 구성되어 있습니다. 이 함선들은 영국의 A급 초기형 기반으로 설계되었습니다. 모든 함선은 제2차 세계 대전에서 전투에 참여했으며, 결국 자침되거나 격침되었습니다. 이 함정들은 1,300톤 이상의 배수량을 가지고 있으며, 120mm 함포 4문을 장착했고, 당시 기준으로 준수한 속도를 가졌습니다."
 HOL_improved_destroyer: "칼렌뷔르흐급"
 HOL_improved_destroyer_desc: "헤라르트 칼렌뷔르흐급은 네덜란드 왕립해군을 위하여 계획된 네 척의 구축함입니다. 네 척 모두 독일의 침공 이전에 진수되었으나, 완성된 것은 두 척뿐이었으며, 그중 한 척은 영국으로 탈출한 후 영국이 완성했고, 다른 한 척은 독일이 완성했습니다. 이 구축함들은 1,600톤이 넘는 배수량을 가지고 있었으며, 주무장으로 120mm 포 5문과 533mm 어뢰관 8문을 장착했고, 속도도 양호했습니다."
 HOL_advanced_destroyer: "피트 헤인급"
 HOL_advanced_destroyer_desc: "피트 헤인급은 종전 직후 네덜란드 왕립해군에게 인도된 3척의 영국 S급 구축함으로 구성되었습니다. 이 함정들은 1,800톤이 넘는 배수량을 가졌으며, 120mm/45 QF Mk IX 포 4문과 다양한 대잠 무기를 장착하고 있습니다."
 MEX_early_destroyer: "과나후아토급"
 NOR_early_destroyer: "드뢰위그급"
 NOR_early_destroyer_desc: "드뢰위그급 구축함 4척은 노르웨이 왕립해군을 위해 건조된 최초의 다함급 구축함입니다. 이들은 제1차 세계 대전 직전에 취역했으며, 배수량은 580톤이었습니다. 주무장으로는 3문의 3인치 영국 QF 포를 장착했습니다. 그러나 동시대 다른 구축함들과 비교해도 속도가 다소 느렸습니다."
 NOR_basic_destroyer: "슬레이프네르급"
 NOR_basic_destroyer_desc: "슬레이프네르급은 노르웨이 왕립해군을 위해 노르웨이에서 건조된 대형 어뢰정으로, 1937년부터 1939년 사이에 취역했습니다. 이전의 드뢰위그급과 달리, 슬레이프네르급은 비교적 우수한 무장과 대잠 장비를 갖추고 있었습니다. 배수량은 735톤이며, 크기에 비해 준수한 속도를 자랑합니다."
 NOR_improved_destroyer: "올레순급"
 NOR_improved_destroyer_desc: "올레순급은 1939년에 건조가 시작되었으나 독일 점령 이전에 완성되지 못한 2척의 구축함으로 구성되어 있습니다. 만약 완성되었다면, 이들은 대부분 주요 국가들의 구축함과 크기 면에서 견줄 만한 최초의 노르웨이 구축함이 되었을 것이며, 배수량은 1,200톤을 초과했을 것입니다. 무장으로는 120mm/40 보포스 포 4문과 533mm 어뢰관 4개가 장착될 예정이었습니다."
 NOR_advanced_destroyer: "스토르급"
 NOR_advanced_destroyer_desc: "스토르급은 1943년부터 1944년 사이에 망명 중인 노르웨이 왕립해군을 위해 건조된 영국 S급 구축함 4척으로 구성되어 있습니다. 이들은 배수량이 약 1,800톤이었으며, 주무장으로 120mm/45 QF Mk IX 포 4문과 533mm 어뢰관 8문, 그리고 우수한 대잠 무장과 레이더 장비를 갖추고 있었습니다. 또한 속도와 신뢰도가 뛰어났습니다."
 NZL_early_destroyer: "V/W급"
 NZL_early_destroyer_desc: "V/W급 구축함의 예시로는 애드미럴리티급과 소니크로프트 V 및 W급이 있습니다. 이들은 전시 비상 계획하에 건조되었습니다. 이들은 제1차 세계 대전에서 쓰인 영국 구축함 설계가 궁극적으로 진화한 형태로서 이전 모델들의 개선점과 새로운 기술적 진보가 모두 반영되어 있습니다. V/W 구축합은 제1차 세계 대전 후반기에 다수 건조되어 이후 영국 해군 구축함 소함대의 중추가 되었습니다. 1930년대부터는 예비 함대로 편입되기 시작했고, 결국에는 수송선 호위 임무만 수행하게 되었습니다. 이들은 적절한 무장을 갖추고 빠른 속도와 넓은 작전 범위를 자랑하는 함선입니다."
 NZL_basic_destroyer: "G/H/I급"
 NZL_basic_destroyer_desc: "G, H, I급 구축함은 1933년과 1934년에 해군 건설 계획의 일환으로 발주되었습니다. 이들은 이전 F급 구축함와 거의 똑같았으며, 크기만 약간 줄어들었습니다. G급과 H급의 무장은 F급과 동일했으며, 모두 4.7인치 함포를 사용했습니다. 이 함선들은 작전 범위가 넓었으며, 무장도 충분했고, 강력한 어뢰를 탑재하고 있었습니다. 전쟁 기간 동안 광범위하게 사용되었으며, 그렇기에 손실도 많았습니다."
 NZL_improved_destroyer: "J/K/N급"
 NZL_improved_destroyer_desc: "J, K, N급 구축함은 이전의 트라이벌급과 유사했으나, 화력보다는 중형 어뢰와 경량 포를 중심으로 한 좀 더 표준적인 설계로 돌아갔습니다. 이 함선들은 전쟁 기간 동안 지속적으로 개조되었으며, 대공포와 레이더가 향상되었습니다. 빠르고, 작전 범위가 넓으며, 함대 호위에 적합한 무장과 성능을 갖춘 함선입니다."
 NZL_advanced_destroyer: "배틀급"
 NZL_advanced_destroyer_desc: "배틀급 구축함은 전쟁 내내 사용된 영국 구축함의 진화를 바탕으로 제작되었습니다. 이 함선들은 1942년과 1943년 해군 계획의 일환으로 주문되었습니다. 이들은 포와 어뢰 양면에서 강력한 무장을 갖추고 있었습니다. 대공 무장, 대잠 능력, 속도, 항속거리가 뛰어난 다목적 함선이었지만, 전쟁 후기에 도입되어 기여도는 미미했습니다."
 POR_early_destroyer: "도루급"
 POR_early_destroyer_desc: "도루급은 1930년대 초에 취역한 7척의 구축함 함급입니다. 이 함선들은 포르투갈과 영국 모두에서 건조되었습니다. 1934년에 2척은 콜롬비아에 판매되었습니다. 이 함선들은 1,200톤 이상의 배수량을 가지며, 4문의 BL 4.7인치 포와 8개의 533mm 어뢰관을 장착하고 있습니다."
 PRU_early_destroyer: "알미란테 비야르급"
 PRU_early_destroyer_desc: "알미란테 비야르와 알미란테 기세는 원래 러시아 노비크급 구축함이었습니다. 이들은 영국과 에스토니아의 기를 달고 항해하는 우여곡절을 겪은 후 1934년에야 페루 해군에 인도되었습니다. 이 함선들은 102mm 60구경 포 4문과 533mm 어뢰관 9문을 장착하고 있었습니다. 배수량은 1,200톤이 넘으며, 크기와 제작 연도에 비해 준수한 속도를 자랑했습니다."
 RAJ_early_destroyer: "V/W급"
 RAJ_early_destroyer_desc: "V/W급 구축함의 예시로는 애드미럴리티급과 소니크로프트 V 및 W급이 있습니다. 이들은 전시 비상 계획하에 건조되었습니다. 이들은 제1차 세계 대전에서 쓰인 영국 구축함 설계가 궁극적으로 진화한 형태로서 이전 모델들의 개선점과 새로운 기술적 진보가 모두 반영되어 있습니다. V/W 구축합은 제1차 세계 대전 후반기에 다수 건조되어 이후 영국 해군 구축함 소함대의 중추가 되었습니다. 1930년대부터는 예비 함대로 편입되기 시작했고, 결국에는 수송선 호위 임무만 수행하게 되었습니다. 이들은 적절한 무장을 갖추고 빠른 속도와 넓은 작전 범위를 자랑하는 함선입니다."
 RAJ_basic_destroyer: "G/H/I급"
 RAJ_basic_destroyer_desc: "G, H, I급 구축함은 1933년과 1934년에 해군 건설 계획의 일환으로 발주되었습니다. 이들은 이전 F급 구축함와 거의 똑같았으며, 크기만 약간 줄어들었습니다. G급과 H급의 무장은 F급과 동일했으며, 모두 4.7인치 함포를 사용했습니다. 이 함선들은 작전 범위가 넓었으며, 무장도 충분했고, 강력한 어뢰를 탑재하고 있었습니다. 전쟁 기간 동안 광범위하게 사용되었으며, 그렇기에 손실도 많았습니다."
 RAJ_improved_destroyer: "J/K/N급"
 RAJ_improved_destroyer_desc: "J, K, N급 구축함은 이전의 트라이벌급과 유사했으나, 화력보다는 중형 어뢰와 경량 포를 중심으로 한 좀 더 표준적인 설계로 돌아갔습니다. 이 함선들은 전쟁 기간 동안 지속적으로 개조되었으며, 대공포와 레이더가 향상되었습니다. 빠르고, 작전 범위가 넓으며, 함대 호위에 적합한 무장과 성능을 갖춘 함선입니다."
 RAJ_advanced_destroyer: "배틀급"
 RAJ_advanced_destroyer_desc: "배틀급 구축함은 전쟁 내내 사용된 영국 구축함의 진화를 바탕으로 제작되었습니다. 이 함선들은 1942년과 1943년 해군 계획의 일환으로 주문되었습니다. 이들은 포와 어뢰 양면에서 강력한 무장을 갖추고 있었습니다. 대공 무장, 대잠 능력, 속도, 항속거리가 뛰어난 다목적 함선이었지만, 전쟁 후기에 도입되어 기여도는 미미했습니다."
 ROM_early_destroyer: "머러슈티급"
 ROM_early_destroyer_desc: "머러슈티급은 제1차 세계 대전 중 루마니아를 위해 건조된 구축함 함급입니다. 이 급의 4척은 전쟁 중 이탈리아 해군에 징발되었으며, 2척은 1920년대 초반에 루마니아에 판매되었습니다. 이들은 배수량이 1,400톤이 넘는 대형 구축함으로, 120mm/45 슈나이더-카네-암스트롱 포 4문과 450mm 어뢰관 4개를 장착했습니다. 당시 기준으로 평균적인 속도와 신뢰도를 갖추고 있었습니다."
 SAF_early_destroyer: "V/W급"
 SAF_early_destroyer_desc: "V/W급 구축함의 예시로는 애드미럴리티급과 소니크로프트 V 및 W급이 있습니다. 이들은 전시 비상 계획하에 건조되었습니다. 이들은 제1차 세계 대전에서 쓰인 영국 구축함 설계가 궁극적으로 진화한 형태로서 이전 모델들의 개선점과 새로운 기술적 진보가 모두 반영되어 있습니다. V/W 구축합은 제1차 세계 대전 후반기에 다수 건조되어 이후 영국 해군 구축함 소함대의 중추가 되었습니다. 1930년대부터는 예비 함대로 편입되기 시작했고, 결국에는 수송선 호위 임무만 수행하게 되었습니다. 이들은 적절한 무장을 갖추고 빠른 속도와 넓은 작전 범위를 자랑하는 함선입니다."
 SAF_basic_destroyer: "G/H/I급"
 SAF_basic_destroyer_desc: "G, H, I급 구축함은 1933년과 1934년에 해군 건설 계획의 일환으로 발주되었습니다. 이들은 이전 F급 구축함와 거의 똑같았으며, 크기만 약간 줄어들었습니다. G급과 H급의 무장은 F급과 동일했으며, 모두 4.7인치 함포를 사용했습니다. 이 함선들은 작전 범위가 넓었으며, 무장도 충분했고, 강력한 어뢰를 탑재하고 있었습니다. 전쟁 기간 동안 광범위하게 사용되었으며, 그렇기에 손실도 많았습니다."
 SAF_improved_destroyer: "J/K/N급"
 SAF_improved_destroyer_desc: "J, K, N급 구축함은 이전의 트라이벌급과 유사했으나, 화력보다는 중형 어뢰와 경량 포를 중심으로 한 좀 더 표준적인 설계로 돌아갔습니다. 이 함선들은 전쟁 기간 동안 지속적으로 개조되었으며, 대공포와 레이더가 향상되었습니다. 빠르고, 작전 범위가 넓으며, 함대 호위에 적합한 무장과 성능을 갖춘 함선입니다."
 SAF_advanced_destroyer: "배틀급"
 SAF_advanced_destroyer_desc: "배틀급 구축함은 전쟁 내내 사용된 영국 구축함의 진화를 바탕으로 제작되었습니다. 이 함선들은 1942년과 1943년 해군 계획의 일환으로 주문되었습니다. 이들은 포와 어뢰 양면에서 강력한 무장을 갖추고 있었습니다. 대공 무장, 대잠 능력, 속도, 항속거리가 뛰어난 다목적 함선이었지만, 전쟁 후기에 도입되어 기여도는 미미했습니다."
 SIA_early_destroyer: "프라 루앙급"
 SIA_early_destroyer_desc: "프라 루앙은 1920년에 영국의 R급 구축함에서 태국 왕립 해군으로 판매된 함정입니다. 이 함정은 배수량이 1,000톤을 조금 넘으며, 120mm/45 QF Mk IV 포 3문과 533mm 어뢰관 4문을 장착하고 있습니다. 당시 기준으로 속도, 항속거리, 신뢰도가 우수했습니다."
 SPA_early_destroyer: "알세도급"
 SPA_early_destroyer_desc: "알세도급 구축함 3척은 스페인 해군을 위해 스페인에서 건조되었습니다. 이들은 영국 L급 설계를 기반으로 하였으며, 1924년에서 1925년 사이에 취역하였습니다. 배수량은 1,040톤을 넘었고, 주무장으로 102mm/45 비커스 Mk LA 포 3문과 450mm 어뢰관 4개를 장착하였습니다. 또한, 당시 기준으로 준수한 속도와 작전 범위를 갖추고 있습니다."
 SPA_basic_destroyer: "추루카급"
 SPA_basic_destroyer_desc: "스페인 추루카급은 1925년부터 1933년 사이에 진수된 구축함 16척으로 구성되었으며, 그중 두 척은 이후 아르헨티나에 판매되었습니다. 이 함선들은 영국 S급 구축함을 기반으로 설계되었으며, 내전 기간 동안 스페인 해군의 중추를 이루었습니다. 배수량은 1,500톤을 넘었고, 주무장으로 120mm/45 비커스-암스트롱 포 5문과 533mm 어뢰관 6문을 장착했습니다. 속도도 우수했고 작전 범위도 뛰어났습니다."
 SPA_advanced_destroyer: "알라바급"
 SPA_advanced_destroyer_desc: "알라바급 구축함은 전후에 이전의 알미란테 안테케라급(이는 이전 추루카급의 하위 함급이었습니다)을 업그레이드한 형태로 진수되었습니다. 이 함정들은 1,710톤의 배수량을 가지며, 주포로 120mm/45 비커스-암스트롱 Mk F 4문을 탑재했습니다. 속도와 작전 범위는 이 급이 기반으로 삼은 이전 설계들과 비슷합니다."
 SPR_early_destroyer: "알세도급"
 SPR_early_destroyer_desc: "알세도급 구축함 3척은 스페인 해군을 위해 스페인에서 건조되었습니다. 이들은 영국 L급 설계를 기반으로 하였으며, 1924년에서 1925년 사이에 취역하였습니다. 배수량은 1,040톤을 넘었고, 주무장으로 102mm/45 비커스 Mk LA 포 3문과 450mm 어뢰관 4개를 장착하였습니다. 또한, 당시 기준으로 준수한 속도와 작전 범위를 갖추고 있습니다."
 SPR_basic_destroyer: "추루카급"
 SPR_basic_destroyer_desc: "스페인 추루카급은 1925년부터 1933년 사이에 진수된 구축함 16척으로 구성되었으며, 그중 두 척은 이후 아르헨티나에 판매되었습니다. 이 함선들은 영국 S급 구축함을 기반으로 설계되었으며, 내전 기간 동안 스페인 해군의 중추를 이루었습니다. 배수량은 1,500톤을 넘었고, 주무장으로 120mm/45 비커스-암스트롱 포 5문과 533mm 어뢰관 6문을 장착했습니다. 속도도 우수했고 작전 범위도 뛰어났습니다."
 SPR_advanced_destroyer: "알라바급"
 SPR_advanced_destroyer_desc: "알라바급 구축함은 전후에 이전의 알미란테 안테케라급(이는 이전 추루카급의 하위 함급이었습니다)을 업그레이드한 형태로 진수되었습니다. 이 함정들은 1,710톤의 배수량을 가지며, 주포로 120mm/45 비커스-암스트롱 Mk F 4문을 탑재했습니다. 속도와 작전 범위는 이 급이 기반으로 삼은 이전 설계들과 비슷합니다."
 SWE_early_destroyer: "에렌셸드급"
 SWE_early_destroyer_desc: "에렌셸드급 구축함 두 척은 1927년에 완성되었으며, 제1차 세계 대전 이후 스웨덴 최초의 현대식 구축함입니다. 배수량은 970톤을 조금 넘었고, 120mm/44 K/45 포 3문과 533mm 어뢰관 6문을 장착했습니다. 항속거리는 짧았으나 속도는 우수했습니다."
 SWE_basic_destroyer: "예테보리급"
 SWE_basic_destroyer_desc: "예테보리급은 1935년에서 1942년 사이에 건조된 6척의 구축함으로 구성되어있었습니다. 전의 급에 비해 긴 선체 및 개량된 기계를 탑재하고있었습니다. 배수량은 1020t 강에서 주포로 120 mm/45 구경 K/45 포를 장비하고 다른 6문의 533 mm 어뢰 발사관을 장비하고있었습니다. 항속거리는 제한되어 있었지만 뛰어난 속도를 가지고 있었습니다."
 SWE_improved_destroyer: "비스뷔급"
 SWE_improved_destroyer_desc: "비스뷔급 구축함 4척은 모두 1942년부터 1944년 사이에 건조되었습니다. 이들은 이전의 예테보리급과 유사했으나, 크기가 더 커서 배수량이 1,130톤을 넘었습니다. 또한 향상된 엔진과 다소 개선된 항속거리, 강력한 대잠 무장을 갖추고 있었습니다."
 SWE_advanced_destroyer: "욀란드급"
 SWE_advanced_destroyer_desc: "§T2척의 욀란드급 구축함은 이전의 설계에서 근본적으로 변화하고 있음을 보여줍니다. 제2차 세계 대전 직후 발주되고 완성되었습니다. 배수량은 1880톤이었으며, 주포로 4문의 120 mm 45구경장 M44 포를 장비하고 다른 강력한 대공 공격 어뢰, 대잠 무장을 장비하고있었습니다. 이 함은 이전 구축함보다 약간 느렸지만, 항속거리는 크게 개선되었습니다.§!"
 TUR_early_destroyer: "페이크급"
 TUR_early_destroyer_desc: "페이크급은 1907년에 오스만 해군에 취역한 대형 고속 어뢰정 2척으로 구성되었습니다. 이 함정들은 독일에서 건조되었으며 제1차 세계 대전에서 살아남았지만, 제2차 세계 대전 시기에는 구식이 되었습니다. 함정의 배수량은 775톤이며, 105mm/37 SK L/40 포 2문과 450mm 어뢰관 3문을 장착하고 있습니다. 작전 범위는 준수했으나 구축함치고는 다소 느린 편이었습니다."
 TUR_basic_destroyer: "바르바로스급"
 TUR_improved_destroyer: "데미르히사르급"
 TUR_improved_destroyer_desc: "데미르히사르급 구축함 4척은 영국에서 건조되어 1942년에 완성되었습니다. 이들 중 2척은 영국 해군에 억류되었으며, 그중 1척은 전쟁 후 반환되었습니다. 이 함선들은 영국 I급 구축함을 기반으로 설계되었습니다. 배수량은 1,370톤이며, 주무장으로 120mm/45 QF Mk IX 포 4문을 장착하고 있습니다. 적당한 속도와 우수한 작전 범위를 갖추었으며, 강력한 대공포와 대잠 무장을 갖추고 있습니다."
 URG_early_destroyer: "우루과이급"
 URG_early_destroyer_desc: "우루과이는 제1차 세계 대전 이전에 우루과이 해군을 위해 독일에서 건조된 중형 어뢰정입니다. 배수량은 1,400톤이 넘었으며, 120mm/45 크루프 QF 포 4문을 장착했습니다. 또한, 강력한 대공 무장과 450mm 어뢰관 2개를 갖추고 있습니다. 제작된 지 오래되고 크기가 커서, 다른 구축함에 비해 속도는 다소 느린 편입니다."
 VIC_early_destroyer: "부라스크급"
 VIC_early_destroyer_desc: "부라스크급 구축함은 1,500톤급 시리즈의 일부로 1920년대 중반에 진수되었습니다. 이전의 샤칼급과 이후의 르아드와급과 함께, 이들은 전후 프랑스 신형 함대의 중추를 이루었습니다. 당시 기준으로 빠르고 무장도 강력했으나, 어뢰 무장은 다른 해군의 유사 함정에 비해 다소 적었습니다."
 VIC_basic_destroyer: "르 팡타스크급"
 VIC_basic_destroyer_desc: "르 팡타스크급 구축함은 1930년 해군 계획에 따라 건조된 2,400톤급 대형 구축함들(게파급, 에이글급, 보클랭급)의 개량형입니다. 이들은 크고 무장이 강력하며 매우 빠른 구축함으로, 프랑스 함대의 새로운 고속 함정을 호위하는 데 적합했습니다. 무장은 새로 개발된 함포, 적절한 대공 무기, 어뢰 무장으로 구성되어 있습니다."
 VIC_improved_destroyer: "랭트레피드급"
 VIC_improved_destroyer_desc: "랭트레피드급 구축함은 이전의 르 아르디급 구축함의 개장형입니다. 1938년과 1939년 해군 계획에서 승인되었으나, 전쟁과 프랑스의 함락으로 인해 취소되었습니다. 이 구축함들은 대공 역할에 더 중점을 두었으며, 배수량이 2,800톤-2,900톤으로 증가하고 더 큰 엔진을 탑재했습니다."
 VIC_advanced_destroyer: "오슈급"
 VIC_advanced_destroyer_desc: "오슈급과 바야르급은 프랑스 해군의 최종 초대형 구축함 설계였습니다. 두 급 모두 모가도르급을 기반으로 하여 4,200톤의 배수량과 유사한 주포를 장착했으나, 대공포가 개선되고 엔진이 강화되었습니다. 이들은 1939년-1940년 해군 계획에서 승인되었으나, 전쟁 발발과 프랑스의 함락으로 인해 건조가 취소되었습니다."
 YUG_early_destroyer: "두브로브니크급"
 YUG_early_destroyer_desc: "드브로브니크 구축함은 구매 당시 유고슬라비아 함대에서 가장 큰 함선이었습니다. 이 함선은 영국에서 건조되어 1932년에 유고슬라비아에 인도되었으며, 1,880톤의 배수량을 가진 대형 구축함이었습니다. 140mm/53 슈코다 포 4문, 강력한 대공 무장, 533mm 어뢰관 6문, 그리고 우수한 대잠 장비를 갖추고 있습니다."
 YUG_basic_destroyer: "베오그라드급"
 YUG_basic_destroyer_desc: "베오그라드급 구축함은 프랑스의 지원으로 건조된 3척의 구축함으로 구성되어 있습니다. 그중 2척은 스플리트에서 건조되었고, 나머지 1척은 프랑스에서 건조되었습니다. 세 척 모두 프랑스의 르아드와급 구축함을 기반으로 하여 1939년에 취역했습니다. 배수량은 1,210톤이며, 120mm/43 슈코다 포 4문과 533mm 어뢰관 6개를 장착하고 있습니다. 속도는 뛰어났으나 항속거리는 평균 이하였습니다."
 YUG_advanced_destroyer: "스플리트급"
 YUG_advanced_destroyer_desc: "스플리트는 유고슬라비아에서 건조되어 완성된 중형 구축함입니다. 1943년에 진수되었으나 개조된 설계로 1958년에야 완성되었습니다. 원래 설계는 배수량 2,400톤이며, 주무장으로 140/56 슈코다 포 5문을 장착했습니다. 크기에 비해 뛰어난 속도를 자랑합니다."
 early_submarine: "잠수함 I"
 basic_submarine: "잠수함 II"
 improved_submarine: "잠수함 III"
 advanced_submarine: "잠수함 IV"
 early_submarine_desc: "잠수함은 무방비한 수송선을 제거하도록 설계된 은밀한 함선입니다. 대전쟁 당시의 초기 잠수함은 새로운 해전 방식의 토대를 마련했습니다."
 basic_submarine_desc: "무장이 강화되고 안정성이 향상된 새로운 설계는 잠수함이 해군 전술의 발전을 활용하고 더 긴 항속거리를 확보하여 먼 수송선 경로까지 공격할 수 있게 합니다."
 improved_submarine_desc: "함대에서 수송선 공격 이외의 잠수함의 역할은 여전히 논쟁 중입니다. 우리에게 필요한 잠수함은 속도와 작전 범위, 무기의 조합을 골고루 갖춘 모델일 것입니다."
 advanced_submarine_desc: "현대 잠수함은 증가한 시험 잠항 심도와 효율적인 내부 배치를 자랑하며, 전장 경험을 활용하여 적절한 무장과 엔진을 탑재합니다."
 ENG_early_submarine: "L급"
 ENG_early_submarine_desc: "L급은 원래 긴급 전쟁 계획하에 이전 잠수함급의 개선형으로 설계된 중형 크기의 잠수함이었습니다. 이들은 제1차 세계 대전 말기에 건조되었으며, 새롭고 더 큰 21인치 어뢰가 장착되었습니다. 제2차 세계 대전 초반까지 운용되었으며, 주로 보조 임무와 훈련 임무에 사용되었습니다."
 ENG_basic_submarine: "T급"
 ENG_basic_submarine_desc: "T급 혹은 트리톤급으로 불린 잠수함들은 O급, P급, R급 대형 잠수함을 대체하기 위해 설계되었습니다. T급 잠수함은 대서양과 태평양에 적합한 긴 작전 범위를 가진 중대형 잠수함이었습니다. 이 잠수함들은 무장을 잘 갖춘 안정적인 플랫폼이었으며, 전쟁 기간에 워낙 널리 사용되어 건조된 잠수함 중 25%가 전쟁 중에 침몰했습니다."
 ENG_improved_submarine: "U급"
 ENG_improved_submarine_desc: "U급 잠수함은 1940년과 1941년의 긴급 전쟁 계획에 의거 건조된 소형 잠수함입니다. 전쟁 발발 당시 훈련용 잠수함으로 설계되었으나, 설계가 변경되어 북해와 지중해의 제한된 해역에서 유용하게 활용되었습니다. 크기가 작아 작전 범위와 무장이 제한적이었습니다. 하위 분류함으로는 언딘급, 엄파이어급, 업로어급의 세 가지가 있습니다."
 ENG_advanced_submarine: "V급"
 ENG_advanced_submarine_desc: "V급 또는 뱀파이어급 잠수함은 이전의 U급 소형 잠수함을 기반으로 만들어졌습니다. 크기는 더 컸지만 여전히 비교적 작았으며, 항해 능력은 향상되었으나 무장과 작전 범위는 제한적이었습니다."
 FRA_early_submarine: "600형"
 FRA_early_submarine_desc: "600(톤)형의 잠수함은 제1차 세계대전 후기 프랑스 최초 현대적인 잠수함 입니다. 중형 크기로, 약 600톤의 배수량을 가지고 있습니다. 원양 항해도 가능 했지만, 해안 잠수함으로 설계되어 지중해의 따뜻한 바다에서 주로 사용되었습니다. 이 유형에는 시렌급, 아리안급, 시르세급이 있었으며 함급마다 4척씩 건조되었습니다. 그들은 배수량이 더 큰 630톤 시리즈의 아르고노트, 디안과 오리옹급의 기초가 되었습니다."
 FRA_basic_submarine: "미네르브급"
 FRA_basic_submarine_desc: "미네르브급 잠수함(프로젝트명 T2)은 630톤 시리즈에 기초하였지만, 엔진이 더 좋고 어뢰 배치가 달랐습니다. 이 잠수함은 조선소 고유의 설계인 이전 급과 달리 DCAN(해군 건설 및 무기국)의 중앙화된 설계 표준화 계획의 첫 번째 결과물였습니다."
 FRA_improved_submarine: "롤랑 모리요급"
 FRA_improved_submarine_desc: "롤랑 모리요급 잠수함(프로젝트명 Z2)은 이전의 르두타블급 잠수함을 기반으로 한 대형 원양 잠수함입니다. 이 잠수함들은 1,800톤-2,400톤의 배수량을 가진 대형 잠수함으로, 10개의 어뢰관이라는 강력한 무장을 탑재하고 있습니다. 프랑스가 함락되기 전에 단 한 척도 완성되지 못했습니다."
 FRA_advanced_submarine: "페닉스급"
 FRA_advanced_submarine_desc: "페닉스급 잠수함은 1939년-1940년 해군 계획에서 승인된 중형 대양 항해용 잠수함으로, 넓은 작전 범위를 지녔습니다. 그러나 전쟁 발발과 프랑스의 함락으로 인해 건조가 취소되었습니다. 이들은 르두타블급과 유사했으나 크기가 더 작고 배수량은 1,200톤이었습니다. 또한 중어뢰 무장을 탑재했습니다."
 GER_early_submarine: "UB III형"
 GER_early_submarine_desc: "UB III형 연안 잠수함은 제1차 세계 대전 중 독일 제국 해군이 건조한 유보트 함급입니다. 이 잠수함은 10발의 어뢰를 탑재했으며, 배수량은 500톤을 넘습니다. 1916년부터 1918년 사이에 96척이 건조되었으나, 1935년까지 모두 퇴역했습니다."
 GER_basic_submarine: "IIA형"
 GER_basic_submarine_desc: "독일의 IIA형 잠수함은 내부 평형 탱크를 갖춘 단일 선체, 전면 용접식 연안 잠수함입니다. 배수량은 250톤을 넘으며, 533mm 어뢰관 5개를 장착하고 있습니다. 1934년부터 1935년 사이에 6척이 건조되었습니다."
 GER_improved_submarine: "VIIC형"
 GER_improved_submarine_desc: "VIIC형 원양 잠수함은 독일 유보트 부대의 주력 잠수함으로, 1940년부터 1945년 사이에 568척이 취역했습니다. 이 함정들은 770톤의 배수량을 가지며, 533mm 어뢰관 5문을 장착하고 있습니다."
 GER_advanced_submarine: "XXI형"
 GER_advanced_submarine_desc: "XXI형 잠수함, 일명 '전기 유보트'는 주로 수중에서 작전을 수행하도록 설계된 최초의 잠수함으로, 탐지를 피하거나 공격을 개시하기 위해 잠수할 수 있는 수상함과는 달랐습니다. 주요 특징은 유선형 선체와 함교, 그리고 다수의 배터리 셀이었습니다. 이 잠수함은 독일 잠수함급 중 가장 큰 편에 속하며, 배수량이 1,620톤을 넘었습니다. 1943년부터 1945년 사이에 118척이 취역했습니다."
 ITA_early_submarine: "마멜리급"
 ITA_early_submarine_desc: "고프레도 마멜리급은 1926년부터 1928년 사이에 진수된 이탈리아 왕립해군의 중형 잠수함급입니다. 배수량은 약 800톤에 달하며, 잠항 심도는 100m입니다. 이들은 이후 피사니급, 판디에라급, 스쿠알로급과 같은 후속 함급의 기초가 되었습니다."
 ITA_basic_submarine: "페를라급"
 ITA_basic_submarine_desc: "페를라급과 아두아급 잠수함은 1930년대에 건조되었습니다. 이들은 이탈리아가 건조한 600 시리즈 잠수함의 세 번째와 네 번째 하위 함급입니다. 이전 함급보다는 작으며, 배수량은 600톤을 조금 넘습니다."
 ITA_improved_submarine: "마르코니급"
 ITA_improved_submarine_desc: "마르코니급 잠수함은 1939년부터 1940년 사이에 건조된 6척의 잠수함으로, 이전의 루이지급 잠수함을 계승했습니다. 두 급의 잠수함 모두 약 1,000톤의 배수량을 가지며, 533mm 어뢰관 8개를 장착했습니다. 두 급의 잠수함 중 전쟁에서 살아남은 건 단 한 척뿐이었습니다."
 ITA_advanced_submarine: "피에트로 칼비급"
 ITA_advanced_submarine_desc: "피에트로 칼비 하위 함급은 중간 크기의 잠수함 함급인 이전의 플루토 함급에 비해 소폭의 개선만 이루어졌습니다. 대부분의 선체가 이탈리아 휴전 후 독일군의 손에 넘어가 소수만이 진수되었습니다. 피에트로 칼비의 재설계 버전은 마침내 1961년에 취역했습니다."
 JAP_early_submarine: "가이추급"
 JAP_early_submarine_desc: "가이추급 잠수함은 제1차 세계 대전 이후에 건조되었으며, 이전 잠수함을 기반으로 제작되었습니다. 이 중형 잠수함들은 적절한 무장을 갖추었고, 작전 범위가 넓으며, 당시 기준으로 속도도 우수했으나 1938년에는 다소 구식이 되었습니다. 총 42척의 가이추형 잠수함이 일본 제국 해군을 위해 건조되었으며, 이 시리즈에는 7가지 변형이 포함되어 있습니다."
 JAP_basic_submarine: "해대 VI급"
 JAP_basic_submarine_desc: "해대 VI급 잠수함은 대형이면서 무장이 강력하고, 작전 범위가 넓으며, 비교적 빠른 속도를 자랑하는 잠수함입니다. 해대 시리즈 전체는 안정적이고 성공적인 잠수함으로, 태평양 전쟁이 끝날 때까지 일본 제국 해군에서 활약했습니다."
 JAP_improved_submarine: "갑형/을형/병형급"
 JAP_improved_submarine_desc: "갑형, 을형, 그리고 병형 잠수함들은 잠수함대들의 지휘를 위해 만들어진 대형 순양잠수함입니다. 정교한 통신 장비와 강력한 어뢰를 갖추고 있었고, 대형 크기로 인해 넓은 작전 범위를 자랑했습니다. 갑형과 을형 함급은 정찰을 위해 수상기를 탑재하기도 했습니다."
 JAP_advanced_submarine: "센토쿠급"
 JAP_advanced_submarine_desc: "센토쿠급 잠수함은 제2차 세계 대전에서 가장 큰 잠수함이었습니다. 이들은 강력한 어뢰와 적절한 경량 대공 무장을 갖춘 잠수함 항공모함이며, 크기와 엔진 덕분에 속도와 작전 범위가 비교적 우수했습니다. 또한 정찰과 제한적인 공격 임무를 위해 아이치 M6A 세이란 함재기를 3대 탑재할 수 있었습니다."
 SOV_early_submarine: "AG급"
 SOV_early_submarine_desc: "아메리칸스키 골란(아메리칸 홀랜드)급 잠수함은 캐나다에서 건조되어 1차 세계 대전 중 러시아로 운송된 후 최종 조립되었습니다. 이 잠수함들은 성능이 검증된 홀랜드형 잠수함을 그대로 복제한 것입니다. 당시 기준으로 무장이 잘 갖추어진 우수한 해상 전투함으로 설계되었습니다."
 SOV_basic_submarine: "슈카급 V 시리즈"
 SOV_basic_submarine_desc: "슈카급의 V 시리즈 잠수함은 소련 해군이 보유했던 잠수함 중 두 번째로 많은 잠수함이었습니다. 그 많은 수는 소비에트 연방의 흑해 함대, 발트 함대, 북방 함대, 태평양 함대에 배치되었던 것에 기인합니다. 이들은 준수한 어뢰 무장과 내항성을 갖춘 중형 순찰 잠수함이었습니다."
 SOV_improved_submarine: "K급 XIV 시리즈"
 SOV_improved_submarine_desc: "XIV 시리즈 잠수함은 장거리 항해가 가능한 대형 순항 잠수함이며, 본질적으로 프라우다급 IV 시리즈의 개량형입니다. 이 잠수함들은 수상 함포와 어뢰 모두 중무장을 갖추고 있습니다. 항속거리는 길지만, 내항성은 간신히 합격인 수준입니다."
 SOV_advanced_submarine: "프로옉트 611형"
 SOV_advanced_submarine_desc: "프로옉트 611형 잠수함(NATO 코드명: 줄루)은 제2차 세계 대전 이후 소련 해군이 처음으로 건조한 잠수함 함급입니다. 이들의 설계는 독일의 21형 유보트를 기반으로 했으며, 선행 함급인 K급 제14계열 순양잠수함을 대체하기 위해 제작되었습니다. 이들은 대형의 원양 잠수함으로, 강력한 어뢰 무장과 넓은 작전 범위를 갖추고 있습니다. 또한, 후속 함급인 프로옉트 613형(NATO 코드명: 위스키)과 프로옉트 641형(NATO 코드명: 폭스트롯) 잠수함의 기초가 되었습니다."
 USA_early_submarine: "S급"
 USA_early_submarine_desc: "일반적으로 슈가보트라고 알려진 S 보트는 1920년대에 설계되고 건조된 51척의 잠수함 시리즈입니다. S 보트는 전방에 21인치 어뢰관이 4개뿐이지만, 제1차 세계 대전 시기의 O 및 R 보트 시리즈에 비해 S 보트는 더 크기 때문에 항속거리가 길고, 어뢰를 더 많이 재장전할 수 있었습니다. S 보트는 1924년을 마지막으로 더 취역되지 않았지만, 미 해군의 현역 잠수함 전력에서 상당한 비중을 차지하고 있습니다."
 USA_basic_submarine: "포퍼스급"
 USA_basic_submarine_desc: "포퍼스급 잠수함은 1920년대 후반과 1930년대 초반에 건조된 일련의 실험용 \"V 보트\" 이후 미 해군이 설계하고 건조한 최초의 현대식 잠수함입니다. 초기에 전기 추진 장치에 문제가 있었지만, 이 함급은 가능성을 보여주었으며 미래에 쓰일 설계로 여겨졌습니다. 이 함급은 6개의 어뢰관과 3인치 갑판포를 장착하고 있습니다."
 USA_improved_submarine: "탬버급"
 USA_improved_submarine_desc: "탬버급 잠수함은 잠수함 설계가 '함대형 함정'의 역할에 대한 적합성과 태평양에서의 원만한 작동을 동시에 만족하기 위해 미해군이 다년간 수행한 실험의 결실입니다. 무장은 4개의 후방 발사관을 포함한 10개의 어뢰관으로 강화되었으며, 추가 방어를 위해 3인치 갑판포와 2개의 대공포가 장착되어 있습니다."
 USA_advanced_submarine: "발라오급"
 USA_advanced_submarine_desc: "발라오급은 탐보르급 설계를 계승한 잠수함입니다. 선체가 보강되고, 무장이 5인치 24구경 갑판포로 강화되고, 그 외 여러 가지 설계 개선이 이루어졌습니다."
 ARG_early_submarine: "산타페급"
 ARG_early_submarine_desc: "산타페급은 이탈리아에 주문되어 1933년에 아르헨티나에 인도된 3척의 잠수함을 의미합니다. 이 함급의 3척은 1960년까지 아르헨티나 잠수함 부대의 중추를 이루었습니다. 이들은 이탈리아 타란토 조선소에서 건조되어 '타란티노스'라는 별명을 얻었습니다."
 AST_early_submarine: "L급"
 AST_early_submarine_desc: "L급은 원래 긴급 전쟁 계획하에 이전 잠수함급의 개선형으로 설계된 중형 크기의 잠수함이었습니다. 이들은 제1차 세계 대전 말기에 건조되었으며, 새롭고 더 큰 21인치 어뢰가 장착되었습니다. 제2차 세계 대전 초반까지 운용되었으며, 주로 보조 임무와 훈련 임무에 사용되었습니다."
 AST_basic_submarine: "T급"
 AST_basic_submarine_desc: "T급 혹은 트리톤급으로 불린 잠수함들은 O급, P급, R급 대형 잠수함을 대체하기 위해 설계되었습니다. T급 잠수함은 대서양과 태평양에 적합한 긴 작전 범위를 가진 중대형 잠수함이었습니다. 이 잠수함들은 무장을 잘 갖춘 안정적인 플랫폼이었으며, 전쟁 기간에 워낙 널리 사용되어 건조된 잠수함 중 25%가 전쟁 중에 침몰했습니다."
 AST_improved_submarine: "U급"
 AST_improved_submarine_desc: "U급 잠수함은 1940년과 1941년의 긴급 전쟁 계획에 의거 건조된 소형 잠수함입니다. 전쟁 발발 당시 훈련용 잠수함으로 설계되었으나, 설계가 변경되어 북해와 지중해의 제한된 해역에서 유용하게 활용되었습니다. 크기가 작아 작전 범위와 무장이 제한적이었습니다. 하위 분류함으로는 언딘급, 엄파이어급, 업로어급의 세 가지가 있습니다."
 AST_advanced_submarine: "V급"
 AST_advanced_submarine_desc: "V급 또는 뱀파이어급 잠수함은 이전의 U급 소형 잠수함을 기반으로 만들어졌습니다. 크기는 더 컸지만 여전히 비교적 작았으며, 항해 능력은 향상되었으나 무장과 작전 범위는 제한적이었습니다."
 BRA_early_submarine: "우마이타급"
 BRA_early_submarine_desc: "우마이타급 잠수함은 이탈리아에서 주문 제작되어 1920년대 후반에 브라질로 전달되었습니다. 이 잠수함은 심해 잠수용으로 설계된 발릴라급을 개조한 형태로 설계되었습니다. 배수량은 약 1,400톤이며, 533mm 어뢰관 6문을 장착하고 있습니다."
 BRA_basic_submarine: "투피급"
 BRA_basic_submarine_desc: "투피급은 1930년대 중반에 이탈리아에 의해 건조된 브라질 잠수함입니다. 이 잠수함들은 배수량이 600톤이 조금 넘는 소형 잠수함으로, 533mm 어뢰 6문을 장착하고 있습니다."
 CAN_early_submarine: "L급"
 CAN_early_submarine_desc: "L급은 원래 긴급 전쟁 계획하에 이전 잠수함급의 개선형으로 설계된 중형 크기의 잠수함이었습니다. 이들은 제1차 세계 대전 말기에 건조되었으며, 새롭고 더 큰 21인치 어뢰가 장착되었습니다. 제2차 세계 대전 초반까지 운용되었으며, 주로 보조 임무와 훈련 임무에 사용되었습니다."
 CAN_basic_submarine: "T급"
 CAN_basic_submarine_desc: "T급 혹은 트리톤급으로 불린 잠수함들은 O급, P급, R급 대형 잠수함을 대체하기 위해 설계되었습니다. T급 잠수함은 대서양과 태평양에 적합한 긴 작전 범위를 가진 중대형 잠수함이었습니다. 이 잠수함들은 무장을 잘 갖춘 안정적인 플랫폼이었으며, 전쟁 기간에 워낙 널리 사용되어 건조된 잠수함 중 25%가 전쟁 중에 침몰했습니다."
 CAN_improved_submarine: "U급"
 CAN_improved_submarine_desc: "U급 잠수함은 1940년과 1941년의 긴급 전쟁 계획에 의거 건조된 소형 잠수함입니다. 전쟁 발발 당시 훈련용 잠수함으로 설계되었으나, 설계가 변경되어 북해와 지중해의 제한된 해역에서 유용하게 활용되었습니다. 크기가 작아 작전 범위와 무장이 제한적이었습니다. 하위 분류함으로는 언딘급, 엄파이어급, 업로어급의 세 가지가 있습니다."
 CAN_advanced_submarine: "V급"
 CAN_advanced_submarine_desc: "V급 또는 뱀파이어급 잠수함은 이전의 U급 소형 잠수함을 기반으로 만들어졌습니다. 크기는 더 컸지만 여전히 비교적 작았으며, 항해 능력은 향상되었으나 무장과 작전 범위는 제한적이었습니다."
 CHL_early_submarine: "H급"
 CHL_early_submarine_desc: "이 잠수함들은 제1차 세계 대전 직후, 전쟁 중에 징발한 잠수함의 대가로 영국이 건조해 칠레에 인도한 6척의 영국 H급 또는 홀랜드 602급 잠수함 집합입니다. 이 잠수함들은 1915년부터 1918년 사이에 건조되었습니다. 배수량은 360톤 이상이며, 잠항 심도는 30m이고, 450mm 어뢰관 4문을 장착하고 있습니다."
 DEN_early_submarine: "로타급"
 DEN_early_submarine_desc: "로타급 잠수함은 제1차 세계 대전 종료 후 덴마크에서 건조되어 취역했습니다. 이 소형 잠수함들은 홀랜드 602 설계를 기반으로 했습니다. 배수량은 290톤이며, 450mm 어뢰관 4문을 장착했습니다."
 DEN_basic_submarine: "하브만덴급"
 DEN_basic_submarine_desc: "하브만덴급 잠수함은 총 다섯 척이 계획되었습니다. 독일 점령 이전에 세 척이 완성되었고, 점령 기간 중 한 척이 완성되었으며, 다섯 번째는 취소되었습니다. 이 잠수함들은 비교적 소형으로, 배수량은 320톤이었습니다. 450mm 어뢰관 5개를 장착하고 있었습니다."
 DEN_advanced_submarine: "스퇴렌급"
 DEN_advanced_submarine_desc: "스퇴렌은 전쟁 후 덴마크 해군에 이관된 영국의 뱀파이어급 잠수함입니다. 이 함정은 배수량 545톤으로 비교적 작았지만, 533mm 어뢰관 4문과 우수한 항해 능력을 갖추고 있습니다."
 EST_basic_submarine: "칼레브급"
 EST_basic_submarine_desc: "칼레브급 잠수함은 1936년 영국에서 에스토니아 해군을 위해 건조된 2척의 잠수함으로 구성되어 있습니다. 주된 임무는 기뢰 부설이었으며, 533mm 어뢰관 4문도 장착하고 있습니다."
 FIN_early_submarine: "베테히넨급"
 FIN_early_submarine_desc: "베테히넨급 잠수함은 핀란드 해군을 위해 건조된 중형 잠수함 3척으로 구성되어 있습니다. 이들은 제1차 세계 대전 시대 독일의 유보트 III 잠수함을 기반으로 제작되었습니다. 배수량은 500톤에 조금 못 미치며, 533mm 어뢰관 4개를 장착하고 있습니다."
 GRE_early_submarine: "카초니스급"
 GRE_early_submarine_desc: "카초니스급 잠수함은 1920년대 후반에 그리스 해군을 위해 프랑스에서 건조되었습니다. 이 급의 두 척 모두 제2차 세계 대전 동안 복무했습니다. 배수량은 약 580톤이며, 533mm 어뢰관 6문을 장착하고 있습니다."
 GRE_basic_submarine: "마트로조스급"
 GRE_basic_submarine_desc: "그리스 잠수함 마트로조스는 이탈리아의 페를라급 잠수함으로, 1942년 영국군에 의해 포획되어 망명 중인 그리스 해군에 인도되었습니다. 이 잠수함은 배수량 680톤이며, 6개의 533mm 어뢰관을 장착하고 있습니다. 최대 잠항 심도는 80m입니다."
 GRE_advanced_submarine: "피피노스급"
 GRE_advanced_submarine_desc: "피피노스급 함선 4척은 1943년부터 1946년 사이에 망명 중인 그리스 해군에 인도된 영국 U급 잠수함입니다. 이 함선들은 545톤의 배수량을 가지며, 533mm 어뢰관 4문을 장착하고 있습니다."
 HOL_early_submarine: "K-III급"
 HOL_early_submarine_desc: "K-III급은 네덜란드 왕립해군을 위해 건조되어 초계 잠수함으로 사용된 2척으로 구성되어 있습니다. 이들은 1920년대 초에 취역했으며, 미국의 홀랜드급 잠수함을 기반으로 제작되었습니다. 각 잠수함은 580톤 이상의 배수량을 가지며, 450mm 어뢰관 4문을 장착하고 있습니다."
 HOL_basic_submarine: "O16급"
 HOL_basic_submarine_desc: "O16 잠수함은 1936년 네덜란드에서 제조되어 네덜란드 왕립해군에 취역했습니다. O16은 980톤이 넘는 배수량을 가진 대형 잠수함이었으며, 최대 잠항 심도는 80m였고, 533mm 어뢰관 8문을 장착하고 있었습니다."
 HOL_improved_submarine: "O21급"
 HOL_improved_submarine_desc: "O21급은 네덜란드에서 건조되어 취역한 7척의 잠수함으로 구성되어 있습니다. 독일의 침공 당시 모든 잠수함이 완성되지 않았으나, 그중 5척은 영국으로 탈출하여 망명 중인 네덜란드 해군에 복무했습니다. 이 잠수함들은 이전 O급 잠수함보다 약간 더 커서 배수량이 990톤을 넘었지만, 533mm 어뢰관 8문으로 무장한 점은 비슷합니다."
 HOL_advanced_submarine: "즈바르드비스급"
 HOL_advanced_submarine_desc: "즈바르드비스급 잠수함은 1943년부터 1945년 사이에 망명 중인 네덜란드 왕립해군에 인도된 영국 태시턴급 잠수함 4척을 의미합니다. 이 함선들은 배수량이 1,090톤이며, 533mm 어뢰관 11문을 장착했고, 잠항 심도는 100m 이상입니다."
 LAT_early_submarine: "로니스급"
 LAT_early_submarine_desc: "로니스급 잠수함은 라트비아 해군을 위해 프랑스에서 건조된 2척의 잠수함으로 구성되어 있습니다. 1927년에 취역한 이 잠수함들은 소형으로, 배수량이 390톤에 불과하며, 533mm 어뢰관 6문을 장착하고 있습니다."
 NOR_early_submarine: "B급"
 NOR_early_submarine_desc: "노르웨이 B급 잠수함은 노르웨이 해군을 위해 노르웨이에서 건조된 미국식 홀랜드형 잠수함입니다. 이 함급의 6척은 1923년부터 1930년 사이에 취역했습니다. 배수량은 420톤이며, 450mm 어뢰관 4문을 장착했고, 잠항 심도는 60m입니다."
 NOR_improved_submarine: "위레드급"
 NOR_improved_submarine_desc: "위레드급은 1941년부터 1943년 사이에 망명 중인 노르웨이 해군을 위해 건조된 영국 U급 잠수함 2척으로 구성되어 있습니다. 이 잠수함들은 540톤의 배수량을 가지며, 533mm 어뢰관 4문을 장착하고 있습니다. 영국산 레이더와 음파탐지기를 잘 갖추고 있으며, 잠항 심도는 60m입니다."
 NOR_advanced_submarine: "위트시라급"
 NOR_advanced_submarine_desc: "위트시라급 잠수함은 영국의 뱀파이어급 잠수함 4척으로 구성되어 있습니다. 이들은 1943년부터 1944년 사이에 건조되었지만, 전쟁이 끝나기 전에 단 한 척만이 망명 중인 노르웨이 해군에 인도되었습니다. 이 잠수함들은 이전의 U급에서 성능이 크게 증가하지 않았습니다. 배수량은 545톤이며, 533mm 어뢰관 4문과 90m의 잠항 심도를 갖추고 있습니다."
 NZL_early_submarine: "L급"
 NZL_early_submarine_desc: "L급은 원래 긴급 전쟁 계획하에 이전 잠수함급의 개선형으로 설계된 중형 크기의 잠수함이었습니다. 이들은 제1차 세계 대전 말기에 건조되었으며, 새롭고 더 큰 21인치 어뢰가 장착되었습니다. 제2차 세계 대전 초반까지 운용되었으며, 주로 보조 임무와 훈련 임무에 사용되었습니다."
 NZL_basic_submarine: "T급"
 NZL_basic_submarine_desc: "T급 혹은 트리톤급으로 불린 잠수함들은 O급, P급, R급 대형 잠수함을 대체하기 위해 설계되었습니다. T급 잠수함은 대서양과 태평양에 적합한 긴 작전 범위를 가진 중대형 잠수함이었습니다. 이 잠수함들은 무장을 잘 갖춘 안정적인 플랫폼이었으며, 전쟁 기간에 워낙 널리 사용되어 건조된 잠수함 중 25%가 전쟁 중에 침몰했습니다."
 NZL_improved_submarine: "U급"
 NZL_improved_submarine_desc: "U급 잠수함은 1940년과 1941년의 긴급 전쟁 계획에 의거 건조된 소형 잠수함입니다. 전쟁 발발 당시 훈련용 잠수함으로 설계되었으나, 설계가 변경되어 북해와 지중해의 제한된 해역에서 유용하게 활용되었습니다. 크기가 작아 작전 범위와 무장이 제한적이었습니다. 하위 분류함으로는 언딘급, 엄파이어급, 업로어급의 세 가지가 있습니다."
 NZL_advanced_submarine: "V급"
 NZL_advanced_submarine_desc: "V급 또는 뱀파이어급 잠수함은 이전의 U급 소형 잠수함을 기반으로 만들어졌습니다. 크기는 더 컸지만 여전히 비교적 작았으며, 항해 능력은 향상되었으나 무장과 작전 범위는 제한적이었습니다."
 POR_early_submarine: "포카급"
 POR_early_submarine_desc: "포르투갈의 포카급 잠수함은 제1차 세계 대전 직후 포르투갈 해군을 위해 이탈리아에서 건조된 소형 잠수함 3척을 의미합니다. 이들은 이탈리아의 에스파다르테급을 확장한 형태이며, 스페인 A급의 자매함입니다. 배수량은 260톤에 불과하며, 450mm 어뢰관 2문을 장착하고 있습니다. 세 척 모두 1930년대 중반 이전에 퇴역하였습니다."
 POR_basic_submarine: "델핌급"
 POR_basic_submarine_desc: "델피임급 잠수함은 1930년대 초 포르투갈 해군을 위해 이탈리아에서 처음 발주되어 건조된 2척의 잠수함으로 구성되어 있습니다. 그러나 발주가 취소되어 해당 함선들은 대신 이탈리아 해군을 위해 완성되었습니다. 이들은 대형 이탈리아 스쿠알로급을 기반으로 하며, 배수량은 980톤이고 533mm 어뢰관 8문을 장착하고 있습니다."
 POR_advanced_submarine: "나르발급"
 POR_advanced_submarine_desc: "나르발급 잠수함은 1945년에 취역한 영국의 서틀급 잠수함 3척으로 구성되었으며, 제2차 세계 대전 후 포르투갈에 판매되었습니다. 이들은 840톤의 배수량을 가지며 533mm 어뢰관 7문을 장착하고 있습니다."
 PRU_early_submarine: "R급"
 PRU_early_submarine_desc: "페루 R급은 1920년대 중반 미국에 주문하여 미국에서 건조된 4척의 잠수함으로 구성되어 있습니다. 이들은 본질적으로 미국 R급 잠수함과 동일하며, 배수량은 570톤 이상이고 533mm 어뢰관 4문을 장착하고 있습니다."
 RAJ_early_submarine: "L급"
 RAJ_early_submarine_desc: "L급은 원래 긴급 전쟁 계획하에 이전 잠수함급의 개선형으로 설계된 중형 크기의 잠수함이었습니다. 이들은 제1차 세계 대전 말기에 건조되었으며, 새롭고 더 큰 21인치 어뢰가 장착되었습니다. 제2차 세계 대전 초반까지 운용되었으며, 주로 보조 임무와 훈련 임무에 사용되었습니다."
 RAJ_basic_submarine: "T급"
 RAJ_basic_submarine_desc: "T급 혹은 트리톤급으로 불린 잠수함들은 O급, P급, R급 대형 잠수함을 대체하기 위해 설계되었습니다. T급 잠수함은 대서양과 태평양에 적합한 긴 작전 범위를 가진 중대형 잠수함이었습니다. 이 잠수함들은 무장을 잘 갖춘 안정적인 플랫폼이었으며, 전쟁 기간에 워낙 널리 사용되어 건조된 잠수함 중 25%가 전쟁 중에 침몰했습니다."
 RAJ_improved_submarine: "U급"
 RAJ_improved_submarine_desc: "U급 잠수함은 1940년과 1941년의 긴급 전쟁 계획에 의거 건조된 소형 잠수함입니다. 전쟁 발발 당시 훈련용 잠수함으로 설계되었으나, 설계가 변경되어 북해와 지중해의 제한된 해역에서 유용하게 활용되었습니다. 크기가 작아 작전 범위와 무장이 제한적이었습니다. 하위 분류함으로는 언딘급, 엄파이어급, 업로어급의 세 가지가 있습니다."
 RAJ_advanced_submarine: "V급"
 RAJ_advanced_submarine_desc: "V급 또는 뱀파이어급 잠수함은 이전의 U급 소형 잠수함을 기반으로 만들어졌습니다. 크기는 더 컸지만 여전히 비교적 작았으며, 항해 능력은 향상되었으나 무장과 작전 범위는 제한적이었습니다."
 ROM_early_submarine: "델피눌급"
 ROM_early_submarine_desc: "델피눌은 루마니아 해군을 위해 이탈리아에서 건조된 루마니아 잠수함입니다. 1930년에 진수되었으며, 배수량은 650톤이고 533mm 어뢰관 6문을 장착하고 있습니다."
 ROM_improved_submarine: "레쿠이눌급"
 ROM_improved_submarine_desc: "레쿠이눌과 마르수이눌 잠수함은 독일이 동맹인 루마니아를 위해 건조했으며, 1943년에 취역했습니다. 이 잠수함들은 독일의 VII형 잠수함을 기반으로 설계되었습니다. 중형 잠수함으로, 배수량은 600톤이며, 533mm 어뢰관 6문을 장착하고 있습니다."
 SAF_early_submarine: "L급"
 SAF_early_submarine_desc: "L급은 원래 긴급 전쟁 계획하에 이전 잠수함급의 개선형으로 설계된 중형 크기의 잠수함이었습니다. 이들은 제1차 세계 대전 말기에 건조되었으며, 새롭고 더 큰 21인치 어뢰가 장착되었습니다. 제2차 세계 대전 초반까지 운용되었으며, 주로 보조 임무와 훈련 임무에 사용되었습니다."
 SAF_basic_submarine: "T급"
 SAF_basic_submarine_desc: "T급 혹은 트리톤급으로 불린 잠수함들은 O급, P급, R급 대형 잠수함을 대체하기 위해 설계되었습니다. T급 잠수함은 대서양과 태평양에 적합한 긴 작전 범위를 가진 중대형 잠수함이었습니다. 이 잠수함들은 무장을 잘 갖춘 안정적인 플랫폼이었으며, 전쟁 기간에 워낙 널리 사용되어 건조된 잠수함 중 25%가 전쟁 중에 침몰했습니다."
 SAF_improved_submarine: "U급"
 SAF_improved_submarine_desc: "U급 잠수함은 1940년과 1941년의 긴급 전쟁 계획에 의거 건조된 소형 잠수함입니다. 전쟁 발발 당시 훈련용 잠수함으로 설계되었으나, 설계가 변경되어 북해와 지중해의 제한된 해역에서 유용하게 활용되었습니다. 크기가 작아 작전 범위와 무장이 제한적이었습니다. 하위 분류함으로는 언딘급, 엄파이어급, 업로어급의 세 가지가 있습니다."
 SAF_advanced_submarine: "V급"
 SAF_advanced_submarine_desc: "V급 또는 뱀파이어급 잠수함은 이전의 U급 소형 잠수함을 기반으로 만들어졌습니다. 크기는 더 컸지만 여전히 비교적 작았으며, 항해 능력은 향상되었으나 무장과 작전 범위는 제한적이었습니다."
 SIA_basic_submarine: "비룬급"
 SIA_basic_submarine_desc: "비룬급 잠수함은 1936년부터 1938년 사이 일본에서 태국 왕립해군을 위해 건조된 4척의 소형 연안 잠수함입니다. 배수량은 370톤이며, 533mm 어뢰관 5문을 장착하고 있습니다."
 SPA_early_submarine: "B급"
 SPA_early_submarine_desc: "B급은 스페인 해군을 위해 스페인 내에서 건조된 최초의 잠수함입니다. 이 급의 잠수한 6척은 1922년부터 1925년 사이에 취역했습니다. 단일 선체로 설계되어 신뢰도가 다소 떨어졌습니다. 중형 잠수함으로, 배수량은 550톤을 넘었습니다. 또, 450mm 어뢰관 4개를 장착했습니다."
 SPA_basic_submarine: "헤네랄 몰라급"
 SPA_basic_submarine_desc: "§T헤네랄 몰라급은 1934년에 취역한 이탈리아 아르키메데스급 잠수함 4척으로 구성된 함급이며, 1937년에 국민군에 양도되었습니다. 이 잠수함들은 크기가 상당해서 배수량이 880톤에 달했지만, 대부분의 잠수함보다 속도가 더 빨랐습니다. 533mm 어뢰관 8문을 장착했고, 최대 잠항 심도는 90m였습니다.§!"
 SPA_improved_submarine: "G급"
 SPA_improved_submarine_desc: "스페인 G급 잠수함은 독일 VIIC급 잠수함을 면허 생산한 스페인 국민전선의 잠수함 두 척이었습니다. 그러나 단 한 척만 완성되었고, 1947년이 되어서야 스페인 해군에 인도되었습니다. 이 잠수함들은 770톤의 배수량을 가졌으며, 533mm 어뢰관 5개를 장착했습니다. VIIC형 잠수함은 독일 잠수함 함대의 주력으로서 뛰어난 속도와 작전 범위를 자랑합니다."
 SPA_advanced_submarine: "D급"
 SPA_advanced_submarine_desc: "스페인 D급 잠수함 세 척은 모두 1944년에 진수되었으며 전쟁 이후 각기 다른 시기에 취역했습니다. 세 척 모두 스페인에서 설계 및 제작되었습니다. 이들은 1,050톤 배수량의 대형 원양 잠수함으로, 533mm 어뢰관 6문을 장착했고 우수한 속도와 작전 범위를 자랑합니다."
 SPR_early_submarine: "B급"
 SPR_early_submarine_desc: "B급은 스페인 해군을 위해 스페인 내에서 건조된 최초의 잠수함입니다. 이 급의 잠수한 6척은 1922년부터 1925년 사이에 취역했습니다. 단일 선체로 설계되어 신뢰도가 다소 떨어졌습니다. 중형 잠수함으로, 배수량은 550톤을 넘었습니다. 또, 450mm 어뢰관 4개를 장착했습니다."
 SPR_basic_submarine: "헤네랄 몰라급"
 SPR_basic_submarine_desc: "헤네랄 몰라급은 1934년에 취역한 이탈리아 아르키메데스급 잠수함 4척으로 구성된 함급이며, 1937년에 국민군에 양도되었습니다. 이 잠수함들은 크기가 상당해서 배수량이 880톤에 달했지만, 대부분의 잠수함보다 속도가 더 빨랐습니다. 533mm 어뢰관 8문을 장착했고, 최대 잠항 심도는 90m였습니다."
 SPR_improved_submarine: "G급"
 SPR_improved_submarine_desc: "스페인 G급 잠수함은 독일 VIIC급 잠수함을 면허 생산한 스페인 국민전선의 잠수함 두 척이었습니다. 그러나 단 한 척만 완성되었고, 1947년이 되어서야 스페인 해군에 인도되었습니다. 이 잠수함들은 770톤의 배수량을 가졌으며, 533mm 어뢰관 5개를 장착했습니다. VIIC형 잠수함은 독일 잠수함 함대의 주력으로서 뛰어난 속도와 작전 범위를 자랑합니다."
 SPR_advanced_submarine: "D급"
 SPR_advanced_submarine_desc: "스페인 D급 잠수함 세 척은 모두 1944년에 진수되었으며 전쟁 이후 각기 다른 시기에 취역했습니다. 세 척 모두 스페인에서 설계 및 제작되었습니다. 이들은 1,050톤 배수량의 대형 원양 잠수함으로, 533mm 어뢰관 6문을 장착했고 우수한 속도와 작전 범위를 자랑합니다."
 SWE_early_submarine: "하옌급"
 SWE_early_submarine_desc: "하옌, 베벤, 발렌급 잠수함은 1920년대 스웨덴 해군을 위해 건조된 소형에서 중형 잠수함 시리즈입니다. 1920년에 취역한 하옌급 잠수함은 약 400톤의 배수량을 가지며 450mm 어뢰관 4문을 장착했습니다. 잠항 심도는 30m에 불과합니다."
 SWE_basic_submarine: "셸레요네트급"
 SWE_basic_submarine_desc: "셸레요네트급 잠수함은 1936년부터 1942년 사이에 건조된 9척으로 구성되어 있습니다. 이들은 580톤 배수량의 중형 잠수함이며, 설계는 네덜란드 O급 잠수함의 영향을 크게 받았습니다. 533mm 어뢰관 6문을 장착했고, 잠항 심도는 60m입니다."
 SWE_improved_submarine: "U급"
 SWE_improved_submarine_desc: "스웨덴 U급 잠수함은 1942년부터 1944년 사이에 취역한 9척의 잠수함 함급입니다. 이들은 비교적 작고 속도가 느렸으며, 배수량은 370톤에 불과합니다. 533mm 어뢰관 4문을 장착하고 있습니다."
 SWE_advanced_submarine: "넵툰급"
 SWE_advanced_submarine_desc: "넵툰급 잠수함은 1943년에 모두 취역한 중형 잠수함 3척으로 구성되어 있습니다. 주로 기뢰 부설 임무에 사용되었습니다. 배수량은 550톤이며, 533mm 어뢰관 5개를 장착하고 있습니다."
 TUR_early_submarine: "비린지 이뇌뉘급"
 TUR_early_submarine_desc: "비린지 이뇌뉘급은 1920년대 중반 네덜란드에서 터키를 위해 건조된 2척의 연안 잠수함으로 구성되었습니다. 이들은 제1차 세계 대전 이후 터키 해군을 위해 건조된 최초의 함선입니다. 배수량은 520톤이며, 450mm 어뢰관 6문을 장착했습니다. 다소 느렸지만 항속거리는 우수했습니다."
 TUR_basic_submarine: "살디레이급"
 TUR_basic_submarine_desc: "살디레이급 잠수함 3척은 1930년대 후반에 진수되었습니다. 이들의 설계는 독일의 영향을 크게 받았으며, 함급의 첫 번째 함선은 독일에서 건조되었고 나머지 두 척은 이스탄불에서 면허를 받아 건조되었습니다. 이들은 930톤이 넘는 배수량을 가진 대형 원양 잠수함으로, 우수한 항속거리를 자랑합니다. 533mm 어뢰관 6문을 장착하고 있습니다."
 TUR_improved_submarine: "오루치 레이스급"
 TUR_improved_submarine_desc: "오루츠 레이스급 잠수함은 영국에서 개량된 영국 S급 설계를 바탕으로 건조되었습니다. 이 함선들은 1940년에 진수되었으며, 일부는 일시적으로 영국 해군에 억류되었습니다. 결국 한 척을 제외한 모든 함선이 터키로 반환되었습니다. 이 함선들은 배수량 625톤이며, 533mm 어뢰관 5문을 장착하고 있습니다. 속도와 항속거리는 다소 제한적입니다."
 TUR_advanced_submarine: "사카리아급"
 TUR_advanced_submarine_desc: "사카리아급 잠수함은 전쟁 후 미국의 발라오급 잠수함을 터키에 판매한 함급입니다. 당시 기준으로 매우 큰 잠수함으로, 배수량이 1,520톤을 넘습니다. 우수한 항속거리와 속도를 자랑하며, 533mm 어뢰관 10문을 장착하고 있습니다."
 VIC_early_submarine: "600형"
 VIC_early_submarine_desc: "600(톤)형의 잠수함은 제1차 세계대전 후기 프랑스 최초 현대적인 잠수함 입니다. 중형 크기로, 약 600톤의 배수량을 가지고 있습니다. 원양 항해도 가능 했지만, 해안 잠수함으로 설계되어 지중해의 따뜻한 바다에서 주로 사용되었습니다. 이 유형에는 시렌급, 아리안급, 시르세급이 있었으며 함급마다 4척씩 건조되었습니다. 그들은 배수량이 더 큰 630톤 시리즈의 아르고노트, 디안과 오리옹급의 기초가 되었습니다."
 VIC_basic_submarine: "미네르브급"
 VIC_basic_submarine_desc: "미네르브급 잠수함(프로젝트명 T2)은 630톤 시리즈에 기초하였지만, 엔진이 더 좋고 어뢰 배치가 달랐습니다. 이 잠수함은 조선소 고유의 설계인 이전 급과 달리 DCAN(해군 건설 및 무기국)의 중앙화된 설계 표준화 계획의 첫 번째 결과물였습니다."
 VIC_improved_submarine: "롤랑 모리요급"
 VIC_improved_submarine_desc: "롤랑 모리요급 잠수함(프로젝트명 Z2)은 이전의 르두타블급 잠수함을 기반으로 한 대형 원양 잠수함입니다. 이 잠수함들은 1,800톤-2,400톤의 배수량을 가진 대형 잠수함으로, 10개의 어뢰관이라는 강력한 무장을 탑재하고 있습니다. 프랑스가 함락되기 전에 단 한 척도 완성되지 못했습니다."
 VIC_advanced_submarine: "페닉스급"
 VIC_advanced_submarine_desc: "페닉스급 잠수함은 1939년-1940년 해군 계획에서 승인된 중형 대양 항해용 잠수함으로, 넓은 작전 범위를 지녔습니다. 그러나 전쟁 발발과 프랑스의 함락으로 인해 건조가 취소되었습니다. 이들은 르두타블급과 유사했으나 크기가 더 작고 배수량은 1,200톤이었습니다. 또한 중어뢰 무장을 탑재했습니다."
 YUG_early_submarine: "흐라브리급"
 YUG_early_submarine_desc: "두 척의 흐라브리급 잠수함은 원래 영국 해군을 위한 L급 잠수함으로 건조되었으나, 1928년에 수정된 설계를 적용하여 유고슬라비아를 위해 최종 완성되고 판매되었습니다. 이 잠수함들은 975톤의 배수량을 가진 대형 잠수함이며, 533mm 어뢰관 6문을 장착하고 있습니다."
 YUG_basic_submarine: "오스베트니크급"
 YUG_basic_submarine_desc: "오스베트니크급 잠수함 2척은 시르세급 잠수함 설계를 바탕으로 프랑스에서 설계 및 건조되었습니다. 이전의 흐라브리급 잠수함보다 다소 작았지만, 533mm 어뢰관 6개를 장착하여 여전히 강력한 화력을 자랑했습니다."
 early_ship_hull_light_desc: "수송선의 안전을 보장하기 위해 대전쟁 시기의 구축함들을 개장하고 발전시켜야 합니다. 더 많은 어뢰를 탑재한다면 교전을 더 많이 할 수 있을 겁니다."
 basic_ship_hull_light_desc: "우리 구축함은 더 긴 어뢰 사거리와 더 빠른 재장전 속도, 대공 포탑 같은 새로운 유형의 무장을 통해 효율성과 범용성을 유지할 것입니다."
 improved_ship_hull_light_desc: "새로운 구축함은 위와 아래에서 덮쳐 오는 위협에 더 잘 대처하기 위해 레이더와 현대식 대공 화기 및 대잠 무기를 장착해야 합니다."
 advanced_ship_hull_light_desc: "현대식 구축함은 다양한 탐지 기술과 새로운 폭뢰 투하 시스템을 갖추어야 하며, 이전 구축함보다 더 큰 배수량을 가져야 합니다."
 early_ship_hull_light: "$ship_hull_light_1$"
 basic_ship_hull_light: "$ship_hull_light_2$"
 improved_ship_hull_light: "$ship_hull_light_3$"
 advanced_ship_hull_light: "$ship_hull_light_4$"
 modern_ship_hull_light: "$ship_hull_light_5$"

 early_ship_hull_submarine_desc: "잠수함은 무방비한 수송선을 제거하도록 설계된 은밀한 함선입니다. 대전쟁 당시의 초기 잠수함은 새로운 해전 방식의 토대를 마련했습니다."
 basic_ship_hull_submarine_desc: "무장이 강화되고 안정성이 향상된 새로운 설계는 잠수함이 해군 전술의 발전을 활용하고 더 긴 항속거리를 확보하여 먼 수송선 경로까지 공격할 수 있게 합니다."
 improved_ship_hull_submarine_desc: "함대에서 수송선 공격 이외의 잠수함의 역할은 여전히 논쟁 중입니다. 우리에게 필요한 잠수함은 속도와 작전 범위, 무기의 조합을 골고루 갖춘 모델일 것입니다."

