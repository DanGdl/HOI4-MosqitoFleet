 ship_hull_light_5: "1948년형 구축함 선체"
 ship_hull_light_5_desc: "빠르게 변화하며 적대적인 해양 환경에서 성공적으로 작전하기 위해, 현대 구축함의 설계에는 완전 자동화된 주포, 개량된 기계 장치, 향상된 탐지 장비와 효과적인 대잠 무장이 적용되었습니다."
 ship_hull_cruiser_5: "1948년형 순양함 선체"
 ship_hull_cruiser_5_desc: "해전에서의 현대적 혁신으로 인해 순양함은 이전 세대보다 더 크고, 더 빠르며, 더 많은 탄약을 탑재하게 되었습니다."
 ship_hull_heavy_5: "1948년형 중함 선체"
 ship_hull_heavy_5_desc: "전함의 시대가 저물어 가면서, 이 거대한 거함들은 종종 파괴적인 시대를 상징하는 유물로 여겨지며, 박물관 전시물로 보존되거나 자신의 운명을 상징적으로 받아들이는 존재가 되었습니다."
 ship_hull_carrier_4: "1948년형 항공모함 선체"
 ship_hull_carrier_4_desc: "항공기가 대구경 함포보다 우위를 점하게 되면서, 이 전후 항공모함들은 더 많은 현대식 항공기와 대공포, 그리고 향상된 방공 수단을 탑재하게 되었습니다. 이 거대한 거함들이 바다로 나서면, 해상 상공의 제해권을 장악하는 것은 더 이상 어려운 일이 아닐 것입니다."
 ship_hull_submarine_5: "1948년형 잠수함 선체"
 ship_hull_submarine_5_desc: "이 진보된 디젤-전기식 잠수함은 개선된 선체 설계를 갖추고 있습니다. 더 빠르고 정밀한 어뢰로 무장한 이 잠수함들은 수송선 습격과 요격에 탁월하며, 해전의 양상을 결정짓는 핵심 전력이 됩니다."
