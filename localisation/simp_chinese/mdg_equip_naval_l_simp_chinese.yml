 ship_hull_light_5: "1948年驱逐舰船体"
 ship_hull_light_5_desc: "为了在迅速变化且充满敌意的海上环境中保持优势，现代驱逐舰的设计采用了全自动主炮、改进的动力系统、强化的探测设备以及高效的反潜武器。"
 ship_hull_cruiser_5: "1948年巡洋舰船体"
 ship_hull_cruiser_5_desc: "海军作战领域的现代化创新使巡洋舰相比上一代舰艇变得更加庞大、更为迅捷，并能够携带更多的弹药。"
 ship_hull_heavy_5: "1948年重型舰船体"
 ship_hull_heavy_5_desc: "随着战列舰时代逐渐走向终结，这些庞大的海上巨兽往往被视为毁灭性时代的象征性遗物，或被保存为博物馆展品，或被有意地送别其既定的命运。"
 ship_hull_carrier_4: "1948年航空母舰船体"
 ship_hull_carrier_4_desc: "随着航空力量对大口径舰炮取得决定性优势，这些战后型航空母舰能够搭载更多现代化舰载机、防空火炮以及完善的防空体系。当这些庞然巨物出现在海面上时，制空权将轻而易举地掌握在我们手中。"
 ship_hull_submarine_5: "1948年潜艇船体"
 ship_hull_submarine_5_desc: "这些先进的柴油—电力潜艇采用了改进的船体设计。凭借更快速且更精准的鱼雷武器，它们在破交战与拦截任务中表现出色，是塑造海上冲突格局的重要力量。"
